<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Gestão de Vazão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8FAFC;
            color: #0F172A;
        }

        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: #FFFFFF;
            width: 800px;
            display: block !important;
        }

        .horizontal-ruler-track {
            width: 100%;
            height: 24px;
            background: #F1F5F9;
            border-radius: 4px;
            position: relative;
            border: 1px solid #E2E8F0;
            overflow: visible;
        }

        .horizontal-fill {
            height: 100%;
            background: linear-gradient(90deg, #3B82F6 0%, #2563EB 100%);
            transition: width 0.5s ease;
            border-radius: 3px;
        }

        .h-mark {
            position: absolute;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(0,0,0,0.1);
        }

        .h-mark-label {
            position: absolute;
            top: 28px;
            transform: translateX(-50%);
            font-size: 9px;
            font-weight: 800;
            color: #64748b;
        }

        .bg-dark-custom { background: #0A0F1C; }
        .bg-green-custom { background: #059669; }
        .bg-header-custom { background: #041E12; }
        
        .export-row {
            border-bottom: 1px solid #F1F5F9;
            padding: 16px 32px;
        }
        .export-unit-name {
            font-size: 20px;
            font-weight: 900;
            color: #1E293B;
            letter-spacing: -0.5px;
        }
        .export-status-badge {
            font-size: 11px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 8px;
            text-transform: uppercase;
        }
        .vazao-value {
            font-size: 28px;
            font-weight: 900;
            line-height: 1;
        }
        .export-header-title {
            font-size: 42px;
            line-height: 1;
        }
        
        .text-off-strong { color: #DC2626; opacity: 1 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const OASIS_LOGO_URL = "https://i.imgur.com/fx8tSao.png";
        const POCOS_LIST = Array.from({ length: 17 }, (_, i) => `POÇO ${String(i + 1).padStart(2, '0')}`);
        const MOTIVOS_LIST = ["TANQUE CHEIO", "MANUTENÇÃO", "ELÉTRICA", "AGUARDANDO"];
        const MAX_NIVEL = 4.71; 
        const MARKERS = [0, 1, 2, 3, 4, 4.71];

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
                droplet: <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />,
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />,
                database: <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const HorizontalRuler = ({ percentage, value, compact = false, exportMode = false }) => (
            <div className="w-full">
                <div className={`relative ${exportMode ? 'mb-8' : 'mb-12'}`}>
                    <div className={exportMode ? 'w-full h-5 bg-slate-100 rounded-md relative border border-slate-200 overflow-visible' : 'horizontal-ruler-track'}>
                        <div className="horizontal-fill" style={{ width: `${Math.min(percentage, 100)}%` }}></div>
                        {MARKERS.map(m => (
                            <React.Fragment key={m}>
                                <div className="h-mark" style={{ left: `${(m/MAX_NIVEL)*100}%` }}></div>
                                <span className="h-mark-label" style={{ left: `${(m/MAX_NIVEL)*100}%` }}>{m}m</span>
                            </React.Fragment>
                        ))}
                    </div>
                </div>
                {!exportMode && (
                    <div className="flex justify-center items-baseline gap-1 mt-2">
                        <span className={`${compact ? 'text-3xl' : 'text-4xl'} font-black text-blue-600 tracking-tighter`}>{Math.round(percentage)}</span>
                        <span className={`${compact ? 'text-xl' : 'text-xl'} font-black text-blue-400`}>%</span>
                    </div>
                )}
            </div>
        );

        function App() {
            const [registros, setRegistros] = useState([]);
            const [nivelTanque, setNivelTanque] = useState("3,20");
            const [isExporting, setIsExporting] = useState(false);
            const [formData, setFormData] = useState({ 
                bloco: 'POÇO 01', 
                segundos: '0,00', 
                status: 'desligado',
                motivo: 'TANQUE CHEIO'
            });
            const [showExport, setShowExport] = useState(false);
            const exportRef = useRef(null);

            useEffect(() => {
                const data = localStorage.getItem('oasis_vazao_v21');
                const tank = localStorage.getItem('oasis_tank_v21');
                if (data) setRegistros(JSON.parse(data));
                if (tank) setNivelTanque(tank);
            }, []);

            const stats = useMemo(() => {
                const poçosAtivos = registros.filter(r => r.status === 'ligado');
                const totalVazao = poçosAtivos.reduce((acc, curr) => acc + (Number(curr.vazao) || 0), 0);
                const vazaoMedia = poçosAtivos.length > 0 ? totalVazao / poçosAtivos.length : 0;
                
                const ativos = poçosAtivos.length;
                const metros = parseFloat(nivelTanque.replace(",", ".")) || 0;
                const porcentagem = (metros / MAX_NIVEL) * 100;

                return { 
                    totalVazao, vazaoMedia, ativos, metros, porcentagem,
                    ordenados: [...registros].sort((a, b) => a.bloco.localeCompare(b.bloco))
                };
            }, [registros, nivelTanque]);

            const handleSave = (e) => {
                e.preventDefault();
                const segs = parseFloat(formData.segundos.replace(",", ".")) || 0;
                const vazaoCalculada = segs > 0 ? (15 / segs) * 3600 : 0;
                
                // Pega a hora atual do registro
                const agora = new Date();
                const horaFormatada = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                
                const novo = { ...formData, vazao: vazaoCalculada, id: Date.now(), hora: horaFormatada };
                const filtrados = registros.filter(r => r.bloco !== formData.bloco);
                const atualizados = [novo, ...filtrados];
                setRegistros(atualizados);
                localStorage.setItem('oasis_vazao_v21', JSON.stringify(atualizados));
            };

            const exportImage = async () => {
                setIsExporting(true);
                setShowExport(true);
                setTimeout(async () => {
                    const canvas = await html2canvas(exportRef.current, { 
                        scale: 2, 
                        useCORS: true,
                        backgroundColor: "#FFFFFF"
                    });
                    const link = document.createElement('a');
                    link.download = `Relatorio_Oasis_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 0.9);
                    link.click();
                    setShowExport(false);
                    setIsExporting(false);
                }, 800);
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-header-custom text-white p-5 sticky top-0 z-40 shadow-lg">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src={OASIS_LOGO_URL} className="h-8" alt="Logo" />
                                <h1 className="text-lg font-black uppercase">Fazenda Oásis</h1>
                            </div>
                            <button onClick={exportImage} className="bg-emerald-600 hover:bg-emerald-500 transition-colors px-6 py-2.5 rounded-full font-black text-[11px] uppercase flex items-center gap-2 shadow-md">
                                <SvgIcon name="image" /> {isExporting ? "Gerando..." : "Exportar Relatório"}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 grid md:grid-cols-[340px_1fr] gap-6 mt-4">
                        <div className="space-y-6">
                            <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <div className="flex justify-between items-center mb-4">
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                        <SvgIcon name="droplet" className="w-3 h-3 text-blue-500" /> Nível Tanque
                                    </p>
                                    <span className="text-[11px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">
                                        {Math.round(stats.porcentagem)}%
                                    </span>
                                </div>
                                <input type="text" value={nivelTanque} 
                                    onChange={(e) => {
                                        let val = e.target.value.replace(/\D/g, "");
                                        let formatted = (parseFloat(val || 0) / 100).toFixed(2).replace(".", ",");
                                        setNivelTanque(formatted);
                                        localStorage.setItem('oasis_tank_v21', formatted);
                                    }}
                                    className="w-full p-3 bg-slate-50 border-2 border-slate-200 rounded-xl text-center font-black text-2xl text-blue-900 outline-none focus:border-blue-400 transition-all mb-4"
                                />
                                <div className="mt-4"><HorizontalRuler percentage={stats.porcentagem} value={nivelTanque} compact /></div>
                            </div>

                            <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div>
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Unidade</p>
                                        <select value={formData.bloco} onChange={e => {
                                            const poçoExistente = registros.find(r => r.bloco === e.target.value);
                                            if(poçoExistente) setFormData(poçoExistente);
                                            else setFormData({...formData, bloco: e.target.value});
                                        }} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none">
                                            {POCOS_LIST.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <button type="button" onClick={() => setFormData({...formData, status: 'ligado'})} className={`py-3 rounded-xl font-black text-[9px] uppercase border-2 transition-all ${formData.status === 'ligado' ? 'bg-emerald-500 text-white border-emerald-600 shadow-md' : 'bg-slate-50 text-slate-400'}`}>Ligado</button>
                                        <button type="button" onClick={() => setFormData({...formData, status: 'desligado'})} className={`py-3 rounded-xl font-black text-[9px] uppercase border-2 transition-all ${formData.status === 'desligado' ? 'bg-red-600 text-white border-red-700 shadow-md' : 'bg-slate-50 text-slate-400'}`}>Desligado</button>
                                    </div>
                                    {formData.status === 'desligado' && (
                                        <div>
                                            <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Motivo</p>
                                            <select value={formData.motivo} onChange={e => setFormData({...formData, motivo: e.target.value})} className="w-full p-2.5 bg-orange-50 border border-orange-100 rounded-xl font-bold text-orange-700 text-xs">
                                                {MOTIVOS_LIST.map(m => <option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                    )}
                                    <div>
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Segundos (15L)</p>
                                        <input type="text" value={formData.segundos}
                                            onChange={e => {
                                                let val = e.target.value.replace(/\D/g, "");
                                                let formatted = (parseFloat(val || 0) / 100).toFixed(2).replace(".", ",");
                                                setFormData({...formData, segundos: formatted});
                                            }}
                                            className="w-full p-3 bg-emerald-50 border-2 border-emerald-100 rounded-xl text-center font-black text-xl text-emerald-900 outline-none"
                                        />
                                    </div>
                                    <button className="w-full bg-header-custom text-white py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg hover:brightness-125 transition-all">Salvar Registro</button>
                                </form>
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div className="grid grid-cols-4 gap-4">
                                <div className="bg-dark-custom p-4 rounded-2xl text-white text-center shadow-md">
                                    <p className="text-[8px] font-black text-emerald-500 uppercase tracking-widest mb-1">Vazão Total</p>
                                    <p className="text-xl font-black text-emerald-400">{stats.totalVazao.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                    <p className="text-[7px] font-bold text-slate-500 mt-1 uppercase">L/H</p>
                                </div>
                                <div className="bg-white p-4 rounded-2xl border border-slate-200 text-center shadow-sm">
                                    <p className="text-[8px] font-black text-blue-400 uppercase tracking-widest mb-1">Média</p>
                                    <p className="text-xl font-black text-blue-600">{stats.vazaoMedia.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                    <p className="text-[7px] font-bold text-slate-400 mt-1 uppercase">L/H</p>
                                </div>
                                <div className="bg-white p-4 rounded-2xl border border-slate-200 text-center shadow-sm">
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Nível</p>
                                    <p className="text-xl font-black text-slate-900">{Math.round(stats.porcentagem)}%</p>
                                    <p className="text-[7px] font-bold text-slate-400 mt-1 uppercase">{nivelTanque}m</p>
                                </div>
                                <div className="bg-green-custom p-4 rounded-2xl text-white text-center shadow-md">
                                    <p className="text-[8px] font-black text-emerald-100 uppercase tracking-widest mb-1">Ativos</p>
                                    <p className="text-xl font-black">{stats.ativos}</p>
                                    <p className="text-[7px] font-bold text-emerald-200 mt-1 uppercase">Unid</p>
                                </div>
                            </div>

                            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                <div className="p-3 bg-slate-50 border-b border-slate-100 text-[9px] font-black text-slate-400 uppercase tracking-widest">Monitoramento em Tempo Real</div>
                                {stats.ordenados.map(reg => (
                                    <div key={reg.id} className="p-4 border-b border-slate-50 flex items-center justify-between hover:bg-slate-50/50 transition-colors">
                                        <div className="flex items-center gap-4">
                                            <div className={`p-2 rounded-lg ${reg.status === 'ligado' ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}>
                                                <SvgIcon name={reg.status === 'ligado' ? "activity" : "database"} className="w-4 h-4" />
                                            </div>
                                            <div>
                                                <div className="flex items-center gap-2">
                                                    <p className="text-sm font-black text-slate-900">{reg.bloco}</p>
                                                    <span className="text-[9px] font-bold text-slate-400 flex items-center gap-1">
                                                        <SvgIcon name="clock" className="w-2.5 h-2.5" /> {reg.hora || '--:--'}
                                                    </span>
                                                </div>
                                                <div className="flex gap-2 mt-0.5">
                                                    <span className={`text-[7px] font-bold px-1.5 py-0.5 rounded uppercase ${reg.status === 'ligado' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-600 text-white'}`}>{reg.status}</span>
                                                    {reg.status === 'desligado' && <span className="text-[7px] font-bold px-1.5 py-0.5 rounded uppercase bg-orange-100 text-orange-700">{reg.motivo}</span>}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="text-right">
                                                <p className={`text-lg font-black ${reg.status === 'ligado' ? 'text-emerald-600' : 'text-off-strong'}`}>
                                                    {reg.vazao.toLocaleString('pt-BR', {maximumFractionDigits:0})} <span className="text-[9px]">L/h</span>
                                                </p>
                                                <p className="text-[8px] font-bold text-slate-400 uppercase">{reg.segundos}s</p>
                                            </div>
                                            <button onClick={() => {
                                                const novos = registros.filter(r => r.id !== reg.id);
                                                setRegistros(novos);
                                                localStorage.setItem('oasis_vazao_v21', JSON.stringify(novos));
                                            }} className="text-slate-200 hover:text-red-500 ml-2"><SvgIcon name="trash" className="w-3.5 h-3.5" /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* ÁREA DE EXPORTAÇÃO */}
                    {showExport && (
                        <div id="export-container" ref={exportRef} className="bg-white">
                            <div className="bg-header-custom p-8 pt-12 flex justify-between items-center text-white border-b-[8px] border-emerald-900">
                                <div className="flex items-center gap-6">
                                    <img src={OASIS_LOGO_URL} className="h-16" crossOrigin="anonymous" />
                                    <div>
                                        <h1 className="export-header-title font-black uppercase tracking-tight mb-0.5">Fazenda Oásis</h1>
                                        <p className="text-xl font-bold text-emerald-400 uppercase tracking-[0.3em]">Registro de Vazão</p>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1">Relatório Gerado em</p>
                                    <p className="text-3xl font-black">{new Date().toLocaleDateString('pt-BR')}</p>
                                </div>
                            </div>

                            <div className="p-8">
                                {/* Linha 1: Indicadores Principais */}
                                <div className="grid grid-cols-3 gap-4 mb-4">
                                    <div className="bg-dark-custom p-6 rounded-[24px] text-white text-center border-b-4 border-emerald-950">
                                        <p className="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-1">Vazão Total</p>
                                        <p className="text-4xl font-black text-emerald-400">{stats.totalVazao.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                        <p className="text-[9px] font-bold text-emerald-800 mt-1 uppercase">Litros / Hora</p>
                                    </div>
                                    <div className="bg-blue-50 p-6 rounded-[24px] border border-blue-100 text-center">
                                        <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">Vazão Média</p>
                                        <p className="text-4xl font-black text-blue-600">{stats.vazaoMedia.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                        <p className="text-[9px] font-bold text-blue-200 mt-1 uppercase">L/H por Poço</p>
                                    </div>
                                    <div className="bg-green-custom p-6 rounded-[24px] text-white text-center border-b-4 border-emerald-800">
                                        <p className="text-[10px] font-black text-emerald-100 uppercase tracking-widest mb-1">Poços Ativos</p>
                                        <p className="text-5xl font-black leading-none">{stats.ativos}</p>
                                        <p className="text-[9px] font-bold text-emerald-900 mt-2 uppercase">Unidades</p>
                                    </div>
                                </div>

                                {/* Linha 2: Régua Métrica ocupando todo o espaço */}
                                <div className="bg-white p-8 px-10 rounded-[24px] border border-slate-100 text-center mb-10">
                                    <div className="flex justify-between items-center mb-4">
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
                                            <p className="text-xs font-black text-slate-600 uppercase tracking-widest">Nível Atual do Tanque Hídrico</p>
                                        </div>
                                        <div className="bg-blue-600 text-white px-4 py-1 rounded-full font-black text-sm">
                                            {nivelTanque}m - {Math.round(stats.porcentagem)}%
                                        </div>
                                    </div>
                                    <HorizontalRuler percentage={stats.porcentagem} value={nivelTanque} exportMode />
                                </div>

                                <div className="bg-white rounded-[32px] border border-slate-100 overflow-hidden shadow-sm mb-8">
                                    <div className="bg-slate-50 py-4 text-center border-b border-slate-100">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em]">Detalhamento Técnico das Unidades</p>
                                    </div>
                                    <div className="divide-y divide-slate-50">
                                        {stats.ordenados.map((r) => (
                                            <div key={r.id} className="export-row flex items-center justify-between">
                                                <div className="flex flex-col w-1/4">
                                                    <div className="flex items-center gap-2">
                                                        <span className="export-unit-name">{r.bloco}</span>
                                                        <span className="text-[10px] font-bold text-slate-400 mt-1">({r.hora || '--:--'})</span>
                                                    </div>
                                                    <span className="text-[9px] font-black text-slate-300 uppercase tracking-widest">Unid. Bombeamento</span>
                                                </div>

                                                <div className="flex items-center justify-center gap-4 w-1/3">
                                                    <div className={`export-status-badge ${r.status === 'ligado' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-600 text-white'}`}>
                                                        {r.status}
                                                    </div>
                                                    {r.status === 'desligado' && (
                                                        <div className="bg-orange-50 text-orange-700 px-3 py-1.5 rounded-lg font-black text-[9px] uppercase border border-orange-100">
                                                            {r.motivo}
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="text-right w-1/3">
                                                    <div className="flex items-baseline justify-end gap-2">
                                                        <span className={`vazao-value ${r.status === 'ligado' ? 'text-emerald-600' : 'text-off-strong'}`}>
                                                            {r.vazao.toLocaleString('pt-BR', {maximumFractionDigits:0})}
                                                        </span>
                                                        <span className={`text-lg font-black ${r.status === 'ligado' ? 'text-emerald-500' : 'text-slate-200'}`}>L/h</span>
                                                    </div>
                                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-1">Aferição: {r.segundos}s</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="py-10 flex flex-col items-center bg-slate-50 rounded-[32px] border border-slate-100">
                                    <p className="text-xl font-black text-slate-900 uppercase tracking-[1em] opacity-10 mb-2">OÁSIS</p>
                                    <p className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Sistemas de Gestão de Precisão Hídrica</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
