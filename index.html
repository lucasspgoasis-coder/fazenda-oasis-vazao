<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Gestão de Vazão</title>
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Bibliotecas de Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
            background-color: #F8FAFC;
        }
        .logo-img { object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1)); }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Container invisível para exportação sem cortes */
        #export-container {
            position: absolute;
            left: -9999px;
            top: 0;
            background: white;
            width: 1100px;
            display: block !important;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const OASIS_LOGO_URL = "https://i.imgur.com/fx8tSao.png";

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                fileText: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        function App() {
            const [registros, setRegistros] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isExporting, setIsExporting] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ bloco: '', segundos: '', status: 'ligado' });
            const [showExportTemplate, setShowExportTemplate] = useState(false);
            const reportRef = useRef(null);

            useEffect(() => {
                const localData = localStorage.getItem('oasis_vazao_data_v2');
                if (localData) setRegistros(JSON.parse(localData));
                setLoading(false);
            }, []);

            const saveToLocal = (data) => {
                localStorage.setItem('oasis_vazao_data_v2', JSON.stringify(data));
                setRegistros(data);
            };

            const stats = useMemo(() => {
                const ligados = registros.filter(r => r.status === 'ligado');
                const desligados = registros.filter(r => r.status === 'desligado');
                
                const somaLigados = ligados.reduce((acc, curr) => acc + (Number(curr.vazaoCalculada) || 0), 0);
                const somaDesligados = desligados.reduce((acc, curr) => acc + (Number(curr.vazaoCalculada) || 0), 0);
                const media = ligados.length > 0 ? somaLigados / ligados.length : 0;
                
                return { 
                    totalLigados: somaLigados,
                    totalDesligados: somaDesligados,
                    media: media,
                    ativos: ligados.length,
                    inativos: desligados.length,
                    totalGeral: registros.length 
                };
            }, [registros]);

            const handleSave = (e) => {
                e.preventDefault();
                const segs = parseFloat(formData.segundos) || 0;
                const vazao = segs > 0 ? (15 / segs) * 3600 : 0;

                const payload = {
                    bloco: formData.bloco.toUpperCase(),
                    segundos: segs,
                    status: formData.status,
                    vazaoCalculada: vazao,
                    dataRegistro: new Date().toLocaleDateString('pt-BR'),
                    id: editingId || Date.now().toString()
                };

                const updatedRecords = editingId 
                    ? registros.map(r => r.id === editingId ? payload : r)
                    : [payload, ...registros];

                saveToLocal(updatedRecords);
                setEditingId(null);
                setFormData({ bloco: '', segundos: '', status: 'ligado' });
            };

            const handleDelete = (id) => {
                if (confirm("Deseja eliminar este registro?")) {
                    saveToLocal(registros.filter(r => r.id !== id));
                }
            };

            const captureReport = async () => {
                setIsExporting(true);
                setShowExportTemplate(true);
                await new Promise(r => setTimeout(r, 600));
                
                const element = reportRef.current;
                const canvas = await html2canvas(element, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: "#ffffff",
                    windowWidth: 1100
                });
                
                setShowExportTemplate(false);
                setIsExporting(false);
                return canvas;
            };

            const exportPDF = async () => {
                const canvas = await captureReport();
                const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                pdf.save("Fazenda_Oasis_Relatorio.pdf");
            };

            const exportJPEG = async () => {
                const canvas = await captureReport();
                const link = document.createElement('a');
                link.download = "Fazenda_Oasis_Relatorio.jpg";
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            };

            if (loading) return null;

            return (
                <div className="min-h-screen flex flex-col bg-[#F1F5F9]">
                    
                    {/* CABEÇALHO */}
                    <header className="bg-[#062C1B] text-white p-5 shadow-xl z-50 sticky top-0 border-b-4 border-emerald-500/20">
                        <div className="max-w-[1500px] mx-auto flex flex-col xl:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-5">
                                <img src={OASIS_LOGO_URL} alt="Logo" className="h-12 logo-img" crossOrigin="anonymous" />
                                <div>
                                    <h1 className="text-2xl font-black uppercase tracking-tighter leading-none mb-2">Fazenda Oásis</h1>
                                    <p className="text-[9px] font-bold text-emerald-400 uppercase tracking-widest mt-2">Gestão Hídrica</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap justify-center gap-3 items-center glass-effect p-3 rounded-2xl border border-white/10 text-slate-900">
                                <div className="text-center px-3">
                                    <p className="text-[8px] font-black text-emerald-700 uppercase mb-0.5 tracking-widest">Total On</p>
                                    <p className="text-xl font-black">{stats.totalLigados.toLocaleString('pt-BR', {maximumFractionDigits:0})} <span className="text-[10px]">L/h</span></p>
                                </div>
                                <div className="w-px h-6 bg-slate-200"></div>
                                <div className="text-center px-3">
                                    <p className="text-[8px] font-black text-red-700 uppercase mb-0.5 tracking-widest">Total Off</p>
                                    <p className="text-xl font-black text-red-600">{stats.totalDesligados.toLocaleString('pt-BR', {maximumFractionDigits:0})} <span className="text-[10px]">L/h</span></p>
                                </div>
                                <div className="w-px h-6 bg-slate-200"></div>
                                <div className="text-center px-3">
                                    <p className="text-[8px] font-black text-slate-500 uppercase mb-0.5 tracking-widest">Média (On)</p>
                                    <p className="text-xl font-black">{stats.media.toLocaleString('pt-BR', {maximumFractionDigits:0})} <span className="text-[10px]">L/h</span></p>
                                </div>
                                <div className="w-px h-6 bg-slate-200"></div>
                                <div className="text-center px-3">
                                    <p className="text-[8px] font-black text-emerald-700 uppercase mb-0.5 tracking-widest">Poços</p>
                                    <p className="text-xl font-black">{stats.ativos} <span className="text-[10px] text-slate-400">On / {stats.inativos} Off</span></p>
                                </div>
                                <div className="flex gap-2 ml-2">
                                    <button onClick={exportJPEG} className="p-3 bg-white hover:bg-slate-50 text-slate-600 rounded-xl transition-all shadow-sm border border-slate-100">
                                        <SvgIcon name="image" className="w-4 h-4" />
                                    </button>
                                    <button onClick={exportPDF} className="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-3 rounded-xl font-black text-[9px] uppercase flex items-center gap-2 shadow-lg transition-all">
                                        <SvgIcon name="fileText" /> {isExporting ? "Aguarde..." : "Relatório"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1400px] mx-auto w-full grid lg:grid-cols-[380px_1fr] gap-8 p-6 flex-1">
                        
                        {/* FORMULÁRIO */}
                        <aside>
                            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-200 sticky top-32">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Registro</h2>
                                    <div className="flex bg-slate-100 p-1 rounded-xl">
                                        <button onClick={() => setFormData({...formData, status: 'ligado'})} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all ${formData.status === 'ligado' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400'}`}>Ligado</button>
                                        <button onClick={() => setFormData({...formData, status: 'desligado'})} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all ${formData.status === 'desligado' ? 'bg-red-600 text-white shadow-md' : 'text-slate-400'}`}>Off</button>
                                    </div>
                                </div>

                                <form onSubmit={handleSave} className="space-y-5">
                                    <div>
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-1 mb-1.5 block">Identificação</label>
                                        <input type="text" required placeholder="POÇO 01" value={formData.bloco} onChange={e => setFormData({...formData, bloco: e.target.value.toUpperCase()})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl font-black text-lg focus:border-emerald-500 outline-none focus:bg-white" />
                                    </div>
                                    
                                    <div>
                                        <label className="text-[9px] font-black text-slate-400 uppercase ml-1 mb-1.5 block">Tempo (15 Litros)</label>
                                        <div className="relative">
                                            <input type="number" step="0.01" required placeholder="0.00" value={formData.segundos} onChange={e => setFormData({...formData, segundos: e.target.value})} className={`w-full p-6 rounded-2xl font-black text-4xl text-center outline-none border ${formData.status === 'ligado' ? 'bg-emerald-50 border-emerald-100 text-emerald-800' : 'bg-red-50 border-red-100 text-red-800'}`} />
                                            <span className="absolute right-4 bottom-4 text-[8px] font-black text-slate-400 uppercase">seg</span>
                                        </div>
                                    </div>

                                    <button type="submit" className={`w-full text-white font-black py-4 rounded-xl shadow-lg uppercase text-[10px] flex items-center justify-center gap-2 transition-all active:scale-95 ${formData.status === 'ligado' ? 'bg-emerald-700 hover:bg-emerald-600' : 'bg-red-700 hover:bg-red-600'}`}>
                                        <SvgIcon name={editingId ? "edit" : "plus"} /> {editingId ? "Atualizar" : "Salvar Registro"}
                                    </button>
                                </form>
                            </div>
                        </aside>

                        {/* LISTA */}
                        <section className="space-y-4 pb-20">
                            <h2 className="text-xl font-black text-slate-800 uppercase italic px-2">Histórico de Coletas</h2>
                            {registros.length === 0 ? (
                                <div className="bg-white rounded-3xl border-2 border-dashed border-slate-200 p-16 text-center text-slate-300 font-black uppercase text-[10px] tracking-widest">Sem registros</div>
                            ) : (
                                <div className="grid gap-3">
                                    {registros.map(reg => (
                                        <div key={reg.id} className="bg-white rounded-2xl p-4 border border-slate-200 flex items-center justify-between group hover:shadow-lg transition-all">
                                            <div className="flex items-center gap-4">
                                                <div className={`w-2 h-10 rounded-full ${reg.status === 'ligado' ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                                                <div>
                                                    <h3 className="text-2xl font-black text-slate-900 leading-none">{reg.bloco}</h3>
                                                    <p className="text-[8px] font-bold text-slate-400 uppercase mt-1 italic">{reg.dataRegistro} • {reg.status}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-8">
                                                <div className="text-center">
                                                    <p className="text-[8px] font-black text-slate-300 uppercase">Tempo</p>
                                                    <p className="text-sm font-bold text-slate-400">{reg.segundos}s</p>
                                                </div>
                                                <div className="text-right min-w-[100px]">
                                                    <p className={`text-2xl font-black leading-none ${reg.status === 'ligado' ? 'text-emerald-700' : 'text-red-600'}`}>
                                                        {reg.vazaoCalculada.toLocaleString('pt-BR', {maximumFractionDigits:0})}
                                                    </p>
                                                    <p className="text-[8px] font-black text-slate-300 uppercase mt-0.5">L / h</p>
                                                </div>
                                                <div className="flex gap-1.5 opacity-0 group-hover:opacity-100 transition-all">
                                                    <button onClick={() => { setEditingId(reg.id); setFormData({bloco: reg.bloco, segundos: reg.segundos, status: reg.status}); window.scrollTo({top:0, behavior:'smooth'}); }} className="p-2 bg-slate-50 text-slate-400 rounded-lg hover:bg-amber-500 hover:text-white transition-all"><SvgIcon name="edit" /></button>
                                                    <button onClick={() => handleDelete(reg.id)} className="p-2 bg-slate-50 text-slate-400 rounded-lg hover:bg-red-600 hover:text-white transition-all"><SvgIcon name="trash" /></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </section>
                    </main>

                    {/* RELATÓRIO EXPORTAÇÃO */}
                    {showExportTemplate && (
                        <div id="export-container" ref={reportRef}>
                            <div className="p-12">
                                <div className="flex justify-between items-center border-b-4 border-emerald-900 pb-8 mb-10">
                                    <div className="flex items-center gap-6">
                                        <img src={OASIS_LOGO_URL} alt="Logo" className="h-16" crossOrigin="anonymous" />
                                        <div>
                                            <h1 className="text-4xl font-black text-slate-900 uppercase tracking-tighter mb-4">Fazenda Oásis</h1>
                                            <p className="text-emerald-600 font-bold tracking-[0.2em] text-sm uppercase mt-4">Relatório de Vazão Hídrica</p>
                                        </div>
                                    </div>
                                    <p className="text-slate-900 font-black text-3xl italic">{new Date().toLocaleDateString('pt-BR')}</p>
                                </div>
                                
                                <div className="grid grid-cols-4 gap-4 mb-10">
                                    <div className="bg-emerald-50 p-6 rounded-3xl border border-emerald-100">
                                        <p className="text-[9px] font-black text-emerald-800 uppercase mb-2 tracking-widest">Vazão Total (ON)</p>
                                        <p className="text-4xl font-black text-emerald-900">{stats.totalLigados.toLocaleString('pt-BR', {maximumFractionDigits:0})} <span className="text-sm">L/h</span></p>
                                    </div>
                                    <div className="bg-red-50 p-6 rounded-3xl border border-red-100">
                                        <p className="text-[9px] font-black text-red-800 uppercase mb-2 tracking-widest">Vazão Total (OFF)</p>
                                        <p className="text-4xl font-black text-red-600">{stats.totalDesligados.toLocaleString('pt-BR', {maximumFractionDigits:0})} <span className="text-sm">L/h</span></p>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-3xl border border-slate-200 text-center">
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest">Média (ON)</p>
                                        <p className="text-4xl font-black text-slate-700">{stats.media.toLocaleString('pt-BR', {maximumFractionDigits:0})} <span className="text-sm">L/h</span></p>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-3xl border border-slate-200 text-right">
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest">Status Poços</p>
                                        <p className="text-3xl font-black text-slate-800">{stats.ativos} <span className="text-xs text-emerald-500 uppercase">On</span> / {stats.inativos} <span className="text-xs text-red-500 uppercase">Off</span></p>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <div className="flex bg-[#062C1B] text-white p-4 rounded-xl font-black uppercase text-[10px] tracking-widest">
                                        <span className="w-1/4 px-2">Poço</span>
                                        <span className="w-1/4 text-center">Status</span>
                                        <span className="w-1/4 text-center">Tempo (15L)</span>
                                        <span className="w-1/4 text-right px-2">Vazão Calculada (L/h)</span>
                                    </div>
                                    {registros.map(r => (
                                        <div key={r.id} className="flex items-center p-6 border-b border-slate-100">
                                            <div className="w-1/4 text-3xl font-black text-slate-900 uppercase px-2 tracking-tighter">{r.bloco}</div>
                                            <div className="w-1/4 text-center">
                                                <span className={`px-4 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest ${r.status === 'ligado' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{r.status}</span>
                                            </div>
                                            <div className="w-1/4 text-center text-xl font-bold text-slate-300 italic">{r.segundos}s</div>
                                            <div className="w-1/4 text-right px-2">
                                                <span className={`text-4xl font-black tracking-tighter ${r.status === 'ligado' ? 'text-emerald-900' : 'text-red-600'}`}>
                                                    {r.vazaoCalculada.toLocaleString('pt-BR', {maximumFractionDigits:0})}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-12 text-center border-t border-slate-100 pt-8">
                                    <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Relatório Gerado Automaticamente • Fazenda Oásis • Gestão Hídrica 2026</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
