<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Gestão de Vazão</title>
    <meta name="theme-color" content="#0F6A52">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Resumo dos Poços">
    
    <!-- Pré-carregamento e Fontes do Google sem utilizar @import no CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" sizes="192x192" href="https://i.imgur.com/aRQ2VUl.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/aRQ2VUl.png">
    
    <!-- Bibliotecas externas utilizando versões estáveis UMD para evitar conflitos de módulos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(180deg, #F8FAFC 0%, #F1F5F9 100%);
            color: #0F172A;
        }

        #export-container {
            position: fixed;
            left: 0;
            top: 0;
            background: #FFFFFF;
            width: 1200px;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            display: block !important;
        }

        .horizontal-ruler-track {
            width: 100%;
            height: 28px;
            background: #F1F5F9;
            border-radius: 8px;
            position: relative;
            border: 1px solid #E2E8F0;
            overflow: visible;
        }

        .horizontal-fill {
            height: 100%;
            background: linear-gradient(90deg, #3B82F6 0%, #1D4ED8 100%);
            transition: width 0.5s ease;
            border-radius: 7px;
        }

        .h-mark {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(15, 23, 42, 0.08);
        }

        .h-mark-label {
            position: absolute;
            top: 32px;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 800;
            color: #475569;
        }

        .app-surface {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            box-shadow: 0 8px 30px rgba(15, 23, 42, 0.04);
        }
        
        .panel-title {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #64748B;
        }
        
        .export-surface {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
        }

        .export-stat-card {
            border-radius: 20px;
            padding: 20px 18px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }

        .table-row-spacing th,
        .table-row-spacing td {
            padding-top: 18px;
            padding-bottom: 18px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;

        const OASIS_LOGO_URL = "https://i.imgur.com/aRQ2VUl.png";
        const POCOS_LIST = Array.from({ length: 17 }, (_, i) => `POÇO ${String(i + 1).padStart(2, '0')}`);
        const MOTIVOS_LIST = ["TANQUE CHEIO", "MANUTENÇÃO", "ELÉTRICA", "AGUARDANDO"];
        const MAX_NIVEL = 4.71; 
        const MARKERS = [0, 1, 2, 3, 4, 4.71];

        // Função para calcular os dias de paragem operacional
        const calcularDiasParado = (dataParada, timestampRegistro) => {
            if (!dataParada) return 0;
            const inicio = new Date(dataParada + 'T00:00:00');
            const fim = new Date(timestampRegistro);
            inicio.setHours(0,0,0,0);
            fim.setHours(0,0,0,0);
            const diff = Math.round((fim - inicio) / (1000 * 60 * 60 * 24));
            return diff >= 0 ? diff : 0;
        };

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
                droplet: <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />,
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />,
                database: <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const HorizontalRuler = ({ percentage, value, compact = false, exportMode = false }) => (
            <div className="w-full">
                <div className={`relative ${exportMode ? 'mb-10' : 'mb-12'}`}>
                    <div className={exportMode ? 'w-full h-6 bg-slate-100 rounded-lg relative border border-slate-200 overflow-visible' : 'horizontal-ruler-track'}>
                        <div className="horizontal-fill" style={{ width: `${Math.min(percentage, 100)}%` }}></div>
                        {MARKERS.map(m => (
                            <React.Fragment key={m}>
                                <div className="h-mark" style={{ left: `${(m/MAX_NIVEL)*100}%` }}></div>
                                <span className="h-mark-label" style={{ left: `${(m/MAX_NIVEL)*100}%` }}>{m}m</span>
                            </React.Fragment>
                        ))}
                    </div>
                </div>
                {!exportMode && (
                    <div className="flex justify-center items-baseline gap-1 mt-2">
                        <span className={`${compact ? 'text-4xl' : 'text-5xl'} font-black text-blue-600 tracking-tighter`}>{Math.round(percentage)}</span>
                        <span className={`${compact ? 'text-xl' : 'text-2xl'} font-black text-blue-400`}>%</span>
                    </div>
                )}
            </div>
        );

        function App() {
            const [registros, setRegistros] = useState([]);
            const [nivelTanque, setNivelTanque] = useState("3,20");
            const [isExporting, setIsExporting] = useState(false);
            const [errorMessage, setErrorMessage] = useState("");
            
            // Adicionado campo 'hora' com o horário atual por padrão
            const [formData, setFormData] = useState({ 
                bloco: 'POÇO 01', 
                segundos: '0,00', 
                status: 'desligado',
                motivo: 'TANQUE CHEIO',
                dataParada: new Date().toISOString().split('T')[0],
                hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
            });

            const [showExport, setShowExport] = useState(false);
            const exportRef = useRef(null);

            useEffect(() => {
                const data = localStorage.getItem('oasis_vazao_v23');
                const tank = localStorage.getItem('oasis_tank_v23');
                if (data) setRegistros(JSON.parse(data));
                if (tank) setNivelTanque(tank);
            }, []);

            const stats = useMemo(() => {
                const totalVazao = registros.reduce((acc, curr) => acc + (Number(curr.vazao) || 0), 0);
                const vazaoMedia = registros.length > 0 ? totalVazao / registros.length : 0;
                
                const ativos = registros.filter(r => r.status === 'ligado').length;
                const metros = parseFloat(nivelTanque.replace(",", ".")) || 0;
                const porcentagem = (metros / MAX_NIVEL) * 100;

                return { 
                    totalVazao, vazaoMedia, ativos, metros, porcentagem,
                    totalRegistros: registros.length,
                    ordenados: [...registros].sort((a, b) => a.bloco.localeCompare(b.bloco))
                };
            }, [registros, nivelTanque]);

            const registrosLigados = useMemo(() => {
                return stats.ordenados.filter(r => r.status === 'ligado');
            }, [stats.ordenados]);

            const registrosTanqueCheio = useMemo(() => {
                return stats.ordenados.filter(r => r.status === 'desligado' && r.motivo === 'TANQUE CHEIO');
            }, [stats.ordenados]);

            const registrosInterrompidos = useMemo(() => {
                return stats.ordenados.filter(r => r.status === 'desligado' && r.motivo !== 'TANQUE CHEIO');
            }, [stats.ordenados]);

            const handleSave = (e) => {
                e.preventDefault();
                const segs = parseFloat(formData.segundos.replace(",", ".")) || 0;
                const vazaoCalculada = segs > 0 ? (15 / segs) * 3600 : 0;
                
                // Salva utilizando os dados do formulário, incluindo a hora digitada manualmente
                const novo = { 
                    ...formData, 
                    vazao: vazaoCalculada, 
                    id: Date.now()
                };

                const filtrados = registros.filter(r => r.bloco !== formData.bloco);
                const atualizados = [novo, ...filtrados];
                setRegistros(atualizados);
                localStorage.setItem('oasis_vazao_v23', JSON.stringify(atualizados));
            };

            const exportImage = async () => {
                setIsExporting(true);
                setShowExport(true);
                setErrorMessage("");
                try {
                    await new Promise((resolve) => setTimeout(resolve, 300));
                    
                    const sourceNode = exportRef.current;
                    if (!sourceNode) throw new Error("Área de exportação não disponível.");

                    const canvas = await html2canvas(sourceNode, {
                        scale: 2, 
                        useCORS: true, 
                        allowTaint: true,
                        backgroundColor: "#ffffff",
                        logging: false
                    });

                    const dataUrl = canvas.toDataURL("image/png");

                    const link = document.createElement('a');
                    link.download = `Relatorio_Oasis_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.png`;
                    link.href = dataUrl;
                    link.click();
                } catch (error) {
                    console.error("Falha ao exportar relatório:", error);
                    setErrorMessage("Não foi possível gerar a imagem. Verifique os dados e tente novamente.");
                    setTimeout(() => setErrorMessage(""), 5000);
                } finally {
                    setShowExport(false);
                    setIsExporting(false);
                }
            };

            return (
                <div className="min-h-screen pb-20 relative">
                    {errorMessage && (
                        <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl z-50 font-bold text-sm animate-bounce">
                            {errorMessage}
                        </div>
                    )}

                    <header className="text-white p-4 sm:p-5 sticky top-0 z-40 shadow-lg" style={{ background: 'linear-gradient(135deg, #072E21 0%, #083526 55%, #0B4A35 100%)' }}>
                        <div className="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src={OASIS_LOGO_URL} className="h-12 sm:h-14" alt="Logo" />
                                <div>
                                    <h1 className="text-xl sm:text-2xl font-black uppercase leading-none">Painel de Vazão</h1>
                                    <p className="text-[10px] font-bold text-emerald-200 uppercase tracking-[0.24em] mt-1">Resumo Operacional</p>
                                </div>
                            </div>
                            <button onClick={exportImage} className="bg-emerald-500 hover:bg-emerald-400 transition-colors px-7 py-3 rounded-full font-black text-[11px] uppercase flex items-center justify-center gap-2 shadow-md w-full sm:w-auto">
                                <SvgIcon name="image" /> {isExporting ? "Gerando..." : "Baixar Imagem"}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-3 sm:p-5 grid md:grid-cols-[360px_1fr] gap-4 sm:gap-6 mt-3 sm:mt-5">
                        <div className="space-y-6">
                            <div className="app-surface p-5 sm:p-6 rounded-3xl">
                                <div className="flex justify-between items-center mb-4">
                                    <p className="panel-title flex items-center gap-2">
                                        <SvgIcon name="droplet" className="w-3.5 h-3.5 text-blue-500" /> Nível Tanque
                                    </p>
                                    <span className="text-[11px] font-black text-blue-700 bg-blue-100 px-2.5 py-1 rounded-full">
                                        {Math.round(stats.porcentagem)}%
                                    </span>
                                </div>
                                <input type="text" value={nivelTanque} 
                                    onChange={(e) => {
                                        let val = e.target.value.replace(/\D/g, "");
                                        let numValue = parseFloat(val || 0) / 100;
                                        if (numValue > 4.71) numValue = 4.71;
                                        let formatted = numValue.toFixed(2).replace(".", ",");
                                        setNivelTanque(formatted);
                                        localStorage.setItem('oasis_tank_v23', formatted);
                                    }}
                                    className="w-full p-3 bg-slate-50 border-2 border-slate-200 rounded-xl text-center font-black text-2xl text-blue-900 outline-none focus:border-blue-400 transition-all mb-4"
                                />
                                <div className="mt-4"><HorizontalRuler percentage={stats.porcentagem} value={nivelTanque} compact /></div>
                            </div>

                            <div className="app-surface p-5 sm:p-6 rounded-3xl">
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div className="grid grid-cols-[1fr_100px] gap-2">
                                        <div>
                                            <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Unidade</p>
                                            <select value={formData.bloco} onChange={e => {
                                                const poçoExistente = registros.find(r => r.bloco === e.target.value);
                                                if(poçoExistente) {
                                                    setFormData({
                                                        ...poçoExistente, 
                                                        // Garante que a hora puxe a hora salva ou a hora atual se estiver vazia
                                                        hora: poçoExistente.hora || new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                                                    });
                                                }
                                                else {
                                                    setFormData({
                                                        ...formData, 
                                                        bloco: e.target.value,
                                                        hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                                                    });
                                                }
                                            }} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none">
                                                {POCOS_LIST.map(p => <option key={p} value={p}>{p}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Hora</p>
                                            <input 
                                                type="time" 
                                                value={formData.hora} 
                                                onChange={e => setFormData({...formData, hora: e.target.value})} 
                                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-800 outline-none"
                                                required
                                            />
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-2">
                                        <button type="button" onClick={() => setFormData({...formData, status: 'ligado'})} className={`py-3 rounded-xl font-black text-[9px] uppercase border-2 transition-all ${formData.status === 'ligado' ? 'bg-emerald-500 text-white border-emerald-600 shadow-md' : 'bg-slate-50 text-slate-400 border-slate-200'}`}>Ligado</button>
                                        <button type="button" onClick={() => setFormData({...formData, status: 'desligado'})} className={`py-3 rounded-xl font-black text-[9px] uppercase border-2 transition-all ${formData.status === 'desligado' ? 'bg-orange-500 text-white border-orange-600 shadow-md' : 'bg-slate-50 text-slate-400 border-slate-200'}`}>Desligado</button>
                                    </div>

                                    {formData.status === 'desligado' && (
                                        <div className={`grid ${formData.motivo === 'MANUTENÇÃO' ? 'grid-cols-2' : 'grid-cols-1'} gap-2`}>
                                            <div>
                                                <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Motivo</p>
                                                <select 
                                                    value={formData.motivo} 
                                                    onChange={e => setFormData({...formData, motivo: e.target.value})} 
                                                    className={`w-full p-2.5 border rounded-xl font-bold text-[10px] outline-none ${formData.motivo === 'MANUTENÇÃO' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-orange-50 border-orange-100 text-orange-700'}`}
                                                >
                                                    {MOTIVOS_LIST.map(m => <option key={m} value={m}>{m}</option>)}
                                                </select>
                                            </div>
                                            {formData.motivo === 'MANUTENÇÃO' && (
                                                <div>
                                                    <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Data da Parada</p>
                                                    <input 
                                                        type="date" 
                                                        value={formData.dataParada}
                                                        onChange={e => setFormData({...formData, dataParada: e.target.value})}
                                                        className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 text-[10px] outline-none"
                                                    />
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    <div>
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Segundos (15L)</p>
                                        <input type="text" value={formData.segundos}
                                            onChange={e => {
                                                let val = e.target.value.replace(/\D/g, "");
                                                let formatted = (parseFloat(val || 0) / 100).toFixed(2).replace(".", ",");
                                                setFormData({...formData, segundos: formatted});
                                            }}
                                            className={`w-full p-3 border-2 rounded-xl text-center font-black text-xl outline-none transition-all ${formData.status === 'desligado' ? 'bg-orange-50 border-orange-100 text-orange-900' : 'bg-emerald-50 border-emerald-100 text-emerald-900'}`}
                                        />
                                    </div>
                                    <button className="w-full text-white py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg hover:brightness-110 transition-all" style={{ background: 'linear-gradient(135deg, #073D2B 0%, #0C5C40 100%)' }}>Salvar Registro</button>
                                </form>
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4">
                                <div className="p-4 rounded-2xl text-white text-center shadow-md" style={{ background: 'linear-gradient(145deg, #2563EB 0%, #1D4ED8 100%)' }}>
                                    <p className="text-[8px] font-black text-blue-100 uppercase tracking-widest mb-1.5">Vazão Total</p>
                                    <p className="text-xl sm:text-2xl font-black text-white">{stats.totalVazao.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                    <p className="text-[7px] font-bold text-blue-100 mt-1.5 uppercase">L/H (Geral)</p>
                                </div>
                                <div className="p-4 rounded-2xl border text-center shadow-sm" style={{ background: '#EEF4FF', borderColor: '#D7E5FF' }}>
                                    <p className="text-[8px] font-black text-blue-500 uppercase tracking-widest mb-1.5">Média</p>
                                    <p className="text-xl sm:text-2xl font-black text-blue-700">{stats.vazaoMedia.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                    <p className="text-[7px] font-bold text-blue-300 mt-1.5 uppercase">L/H</p>
                                </div>
                                <div className="p-4 rounded-2xl border text-center shadow-sm" style={{ background: '#FFFFFF', borderColor: '#DCE3ED' }}>
                                    <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1.5">Nível</p>
                                    <p className="text-xl sm:text-2xl font-black text-slate-800">{Math.round(stats.porcentagem)}%</p>
                                    <p className="text-[7px] font-bold text-slate-500 mt-1.5 uppercase">{nivelTanque}m</p>
                                </div>
                                <div className="p-4 rounded-2xl text-white text-center shadow-md" style={{ background: '#1F9F77' }}>
                                    <p className="text-[8px] font-black text-emerald-100 uppercase tracking-widest mb-1.5">Ativos</p>
                                    <p className="text-xl sm:text-2xl font-black">{stats.ativos}</p>
                                    <p className="text-[7px] font-bold text-emerald-50 mt-1.5 uppercase">de {stats.totalRegistros}</p>
                                </div>
                            </div>

                            <div className="app-surface rounded-2xl overflow-hidden">
                                <div className="p-4 bg-slate-50 border-b border-slate-200 text-[10px] font-black text-slate-500 uppercase tracking-widest">Monitoramento em Tempo Real</div>
                                {stats.ordenados.length === 0 ? (
                                    <div className="p-8 text-center text-slate-400 font-medium">Nenhum registro encontrado. Cadastre um poço ao lado.</div>
                                ) : (
                                    stats.ordenados.map(reg => (
                                        <div key={reg.id} className="p-4 sm:p-5 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3 hover:bg-slate-50/50 transition-colors">
                                            <div className="flex items-center gap-4">
                                                <div className={`p-2.5 rounded-xl ${reg.status === 'ligado' ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'}`}>
                                                    <SvgIcon name={reg.status === 'ligado' ? "activity" : "database"} className="w-5 h-5" />
                                                </div>
                                                <div>
                                                    <div className="flex items-center gap-2.5">
                                                        <p className="text-base font-black text-slate-900">{reg.bloco}</p>
                                                        <span className="text-[10px] font-bold text-slate-400 flex items-center gap-1 bg-slate-100 px-2 py-0.5 rounded-full">
                                                            <SvgIcon name="clock" className="w-2.5 h-2.5" /> {reg.hora || '--:--'}
                                                        </span>
                                                    </div>
                                                    <div className="flex gap-2 mt-1.5 items-center flex-wrap">
                                                        <span className={`text-[8px] font-extrabold px-2 py-0.5 rounded uppercase tracking-wider ${reg.status === 'ligado' ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-500 text-white'}`}>{reg.status}</span>
                                                        
                                                        {reg.status === 'desligado' && (
                                                            <>
                                                                <span className={`text-[8px] font-extrabold px-2 py-0.5 rounded flex items-center uppercase tracking-wider ${reg.motivo === 'MANUTENÇÃO' ? 'bg-red-600 text-white' : 'bg-orange-100 text-orange-700'}`}>{reg.motivo}</span>
                                                                {reg.motivo === 'MANUTENÇÃO' && reg.dataParada && (
                                                                    <div className="flex flex-col bg-red-50 border border-red-200 rounded px-2.5 py-0.5 leading-none justify-center ml-1">
                                                                        <span className="text-[6px] font-black text-red-500 uppercase tracking-wide">Desde {reg.dataParada.split('-').reverse().join('/')}</span>
                                                                        <span className="text-[9px] font-black text-red-700 uppercase mt-[2px]">
                                                                            {calcularDiasParado(reg.dataParada, reg.id)} {calcularDiasParado(reg.dataParada, reg.id) === 1 ? 'dia' : 'dias'}
                                                                        </span>
                                                                    </div>
                                                                )}
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex items-center justify-between sm:justify-start gap-5 w-full sm:w-auto">
                                                <div className="text-right ml-auto sm:ml-0">
                                                    <p className={`text-xl font-black leading-none ${reg.status === 'ligado' ? 'text-emerald-600' : 'text-orange-500'}`}>
                                                        {reg.vazao.toLocaleString('pt-BR', {maximumFractionDigits:0})} <span className="text-[10px] font-bold">L/h</span>
                                                    </p>
                                                    <p className={`inline-block text-[9px] font-extrabold uppercase px-2 py-0.5 rounded border mt-2 ${reg.status === 'ligado' ? 'border-blue-200 text-blue-700 bg-blue-50/80' : (reg.motivo === 'MANUTENÇÃO' ? 'border-red-200 text-red-700 bg-red-50/80' : 'border-orange-200 text-orange-700 bg-orange-50/80')}`}>
                                                        Aferição: {reg.segundos}s
                                                    </p>
                                                </div>
                                                <button onClick={() => {
                                                    const novos = registros.filter(r => r.id !== reg.id);
                                                    setRegistros(novos);
                                                    localStorage.setItem('oasis_vazao_v23', JSON.stringify(novos));
                                                }} className="text-slate-300 hover:text-red-500 p-2 transition-colors"><SvgIcon name="trash" className="w-4 h-4" /></button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </main>

                    {showExport && (
                        <div id="export-container" ref={exportRef} className="bg-white">
                            {/* Cabeçalho da Imagem */}
                            <div className="px-10 py-8 text-white border-b-[8px] border-emerald-600" style={{background: 'linear-gradient(135deg, #0D5B46 0%, #0F6A52 55%, #158368 100%)'}}>
                                <div className="grid grid-cols-[120px_minmax(0,1fr)_300px] items-center gap-6 min-h-[112px]">
                                    <div className="flex justify-center">
                                        <img src={OASIS_LOGO_URL} className="h-[96px] w-auto" crossOrigin="anonymous" />
                                    </div>
                                    <div className="text-left min-w-0">
                                        <h1 className="text-[34px] font-extrabold uppercase tracking-tight leading-none mb-1.5 text-white">Fazenda Oásis</h1>
                                        <p className="text-[15px] font-black text-emerald-200 uppercase tracking-[0.16em] mb-1">Gestão de Vazão Hídrica</p>
                                        <p className="text-[12px] font-medium text-emerald-100 opacity-90">Relatório Consolidado de Poços</p>
                                    </div>
                                    <div className="text-center bg-white/10 border border-white/20 rounded-2xl px-5 py-3.5 backdrop-blur-md w-[300px] self-center justify-self-end">
                                        <p className="text-[11px] font-black text-emerald-100 uppercase tracking-widest mb-1.5">Relatório Gerado em</p>
                                        <p className="text-3xl font-black leading-none">{new Date().toLocaleDateString('pt-BR')}</p>
                                    </div>
                                </div>
                            </div>

                            <div className="p-10 bg-slate-50 space-y-8">
                                {/* Cards de Estatística */}
                                <div className="grid grid-cols-3 gap-6">
                                    <div className="export-stat-card text-white shadow-lg" style={{ background: 'linear-gradient(145deg, #2563EB 0%, #1D4ED8 100%)' }}>
                                        <p className="text-[11px] font-black text-blue-100 uppercase tracking-widest mb-1.5">Vazão Total Atual</p>
                                        <p className="text-4xl font-black text-white leading-none">{stats.totalVazao.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                        <p className="text-[10px] font-bold text-blue-100 mt-2.5 uppercase">Litros por Hora</p>
                                    </div>
                                    <div className="export-stat-card border shadow-sm" style={{ background: '#EEF4FF', borderColor: '#D7E5FF' }}>
                                        <p className="text-[11px] font-black text-blue-500 uppercase tracking-widest mb-1.5">Média por Poço</p>
                                        <p className="text-4xl font-black text-blue-700 leading-none">{stats.vazaoMedia.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                        <p className="text-[10px] font-bold text-blue-400 mt-2.5 uppercase">L/H (Geral)</p>
                                    </div>
                                    <div className="export-stat-card text-white shadow-lg" style={{ background: '#1F9F77' }}>
                                        <p className="text-[11px] font-black text-emerald-100 uppercase tracking-widest mb-1.5">Poços Operacionais</p>
                                        <p className="text-5xl font-black leading-none">{stats.ativos}</p>
                                        <p className="text-[10px] font-bold text-emerald-50 mt-3 uppercase">de {stats.totalRegistros} registrados</p>
                                    </div>
                                </div>

                                {/* Seção do Nível do Tanque */}
                                <div className="bg-white rounded-2xl p-8 px-10 text-center shadow-md border border-slate-200">
                                    <div className="flex justify-between items-center mb-6">
                                        <div className="flex items-center gap-3">
                                            <div className="w-4.5 h-4.5 bg-blue-500 rounded-full"></div>
                                            <p className="text-lg font-black text-slate-800 uppercase tracking-wider">Nível de Armazenamento do Tanque Hídrico</p>
                                        </div>
                                        <div className="bg-blue-600 text-white px-6 py-2.5 rounded-full font-black text-2xl leading-none shadow-md">
                                            {nivelTanque}m <span className="text-lg font-bold opacity-80">({Math.round(stats.porcentagem)}%)</span>
                                        </div>
                                    </div>
                                    <HorizontalRuler percentage={stats.porcentagem} value={nivelTanque} exportMode />
                                </div>

                                {/* PARTE 1: POÇOS EM ATIVIDADE (LIGADOS) - Oculta se vazio */}
                                {registrosLigados.length > 0 && (
                                    <div className="bg-white rounded-2xl overflow-hidden shadow-md border border-slate-200">
                                        <div className="bg-emerald-900 py-4 px-6 flex items-center justify-between border-b border-emerald-800">
                                            <div className="flex items-center gap-2">
                                                <span className="w-3 h-3 bg-emerald-400 rounded-full"></span>
                                                <h2 className="text-[13px] font-black text-white uppercase tracking-[0.2em]">Parte 1: Poços em Operação (Ligados)</h2>
                                            </div>
                                            <span className="text-[10px] font-bold text-emerald-300 uppercase tracking-widest">Ativos</span>
                                        </div>

                                        <table className="w-full text-left border-collapse bg-white">
                                            <thead>
                                                <tr className="bg-emerald-50/40 border-b border-emerald-100 text-[11px] font-black text-emerald-800 uppercase tracking-wider text-center">
                                                    <th className="py-4.5 px-6 w-[20%] text-left">Unidade</th>
                                                    <th className="py-4.5 px-6 w-[22%] text-center">Status</th>
                                                    <th className="py-4.5 px-6 w-[28%] text-center">Diagnóstico</th>
                                                    <th className="py-4.5 px-6 w-[15%] text-center">Aferição</th>
                                                    <th className="py-4.5 px-6 text-right w-[15%]">Vazão Atual</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {registrosLigados.map((r, index) => (
                                                    <tr key={r.id} className={`table-row-spacing ${index % 2 === 0 ? "bg-white" : "bg-emerald-50/10"}`}>
                                                        <td className="px-6 font-extrabold text-slate-900 text-left">
                                                            <p className="text-lg leading-none mb-1.5">{r.bloco}</p>
                                                            <p className="text-[10px] font-semibold text-slate-400 flex items-center gap-1">
                                                                <SvgIcon name="clock" className="w-2.5 h-2.5" /> Reg: {r.hora || '--:--'}
                                                            </p>
                                                        </td>
                                                        <td className="px-6 text-center">
                                                            <span className="inline-block px-3 py-1 rounded-full text-[10px] font-black border uppercase tracking-wider bg-emerald-100 text-emerald-800 border-emerald-200">
                                                                LIGADO
                                                            </span>
                                                        </td>
                                                        <td className="px-6 text-center">
                                                            <div className="flex items-center justify-center gap-1.5 text-emerald-700 mx-auto">
                                                                <span className="inline-block w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
                                                                <span className="text-[11px] font-bold uppercase">Operando sem anormalidades</span>
                                                            </div>
                                                        </td>
                                                        <td className="px-6 text-center">
                                                            <span className="inline-flex items-center justify-center px-3 py-1 rounded-md border border-slate-200 bg-slate-50 font-bold text-sm text-slate-700">
                                                                {r.segundos}s
                                                            </span>
                                                        </td>
                                                        <td className="px-6 text-right">
                                                            <div className="inline-flex items-baseline justify-center w-[130px] px-3.5 py-2 rounded-xl border border-emerald-200 bg-emerald-50">
                                                                <p className="text-2xl font-black text-emerald-600 leading-none">
                                                                    {r.vazao.toLocaleString('pt-BR', {maximumFractionDigits:0})}
                                                                    <span className="text-[11px] font-bold ml-1 text-emerald-500/70">L/h</span>
                                                                </p>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {/* PARTE 2: POÇOS DESLIGADOS - RESERVATÓRIO CHEIO - Oculta se vazio */}
                                {registrosTanqueCheio.length > 0 && (
                                    <div className="bg-white rounded-2xl overflow-hidden shadow-md border border-slate-200">
                                        <div className="bg-blue-900 py-4 px-6 flex items-center justify-between border-b border-blue-850">
                                            <div className="flex items-center gap-2">
                                                <span className="w-3 h-3 bg-blue-400 rounded-full"></span>
                                                <h2 className="text-[13px] font-black text-white uppercase tracking-[0.2em]">Parte 2: Poços Desligados (Tanque Cheio)</h2>
                                            </div>
                                            <span className="text-[10px] font-bold text-blue-300 uppercase tracking-widest">Capacidade Máxima</span>
                                        </div>

                                        <table className="w-full text-left border-collapse bg-white">
                                            <thead>
                                                <tr className="bg-blue-50/40 border-b border-blue-100 text-[11px] font-black text-blue-800 uppercase tracking-wider text-center">
                                                    <th className="py-4.5 px-6 w-[20%] text-left">Unidade</th>
                                                    <th className="py-4.5 px-6 w-[22%] text-center">Status</th>
                                                    <th className="py-4.5 px-6 w-[28%] text-center">Diagnóstico</th>
                                                    <th className="py-4.5 px-6 w-[15%] text-center">Aferição</th>
                                                    <th className="py-4.5 px-6 text-right w-[15%]">Última Vazão</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {registrosTanqueCheio.map((r, index) => (
                                                    <tr key={r.id} className={`table-row-spacing ${index % 2 === 0 ? "bg-white" : "bg-blue-50/10"}`}>
                                                        <td className="px-6 font-extrabold text-slate-900 text-left">
                                                            <p className="text-lg leading-none mb-1.5">{r.bloco}</p>
                                                            <p className="text-[10px] font-semibold text-slate-400 flex items-center gap-1">
                                                                <SvgIcon name="clock" className="w-2.5 h-2.5" /> Reg: {r.hora || '--:--'}
                                                            </p>
                                                        </td>
                                                        <td className="px-6 text-center">
                                                            <span className="inline-block px-3 py-1 rounded-full text-[10px] font-black border uppercase tracking-wider bg-blue-100 text-blue-800 border-blue-200">
                                                                T. CHEIO
                                                            </span>
                                                        </td>
                                                        <td className="px-6 text-center">
                                                            <span className="text-[11px] font-bold text-blue-600 uppercase block text-center">
                                                                Desativação preventiva automática
                                                            </span>
                                                        </td>
                                                        <td className="px-6 text-center">
                                                            <span className="inline-flex items-center justify-center px-3 py-1 rounded-md border border-slate-200 bg-slate-50 font-bold text-sm text-slate-700">
                                                                {r.segundos}s
                                                            </span>
                                                        </td>
                                                        <td className="px-6 text-right">
                                                            <div className="inline-flex items-baseline justify-center w-[130px] px-3.5 py-2 rounded-xl border border-blue-200 bg-blue-50">
                                                                <p className="text-2xl font-black text-blue-600 leading-none">
                                                                    {r.vazao.toLocaleString('pt-BR', {maximumFractionDigits:0})}
                                                                    <span className="text-[11px] font-bold ml-1 text-blue-500/70">L/h</span>
                                                                </p>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {/* PARTE 3: POÇOS EM MANUTENÇÃO E OUTROS PARADOS - Oculta se vazio */}
                                {registrosInterrompidos.length > 0 && (
                                    <div className="bg-white rounded-2xl overflow-hidden shadow-md border border-slate-200">
                                        <div className="bg-slate-800 py-4 px-6 flex items-center justify-between border-b border-slate-700">
                                            <div className="flex items-center gap-2">
                                                <span className="w-3 h-3 bg-red-400 rounded-full"></span>
                                                <h2 className="text-[13px] font-black text-white uppercase tracking-[0.2em]">Parte 3: Poços Interrompidos (Manutenção / Outros)</h2>
                                            </div>
                                            <span className="text-[10px] font-bold text-orange-300 uppercase tracking-widest">Ações Operacionais</span>
                                        </div>

                                        <table className="w-full text-left border-collapse bg-white">
                                            <thead>
                                                <tr className="bg-orange-50/40 border-b border-orange-100 text-[11px] font-black text-orange-850 uppercase tracking-wider text-center">
                                                    <th className="py-4.5 px-6 w-[20%] text-left">Unidade</th>
                                                    <th className="py-4.5 px-6 w-[22%] text-center">Status / Evento</th>
                                                    <th className="py-4.5 px-6 w-[28%] text-center">Janela de Tempo / Causa</th>
                                                    <th className="py-4.5 px-6 w-[15%] text-center">Aferição</th>
                                                    <th className="py-4.5 px-6 text-right w-[15%]">Última Vazão</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {registrosInterrompidos.map((r, index) => {
                                                    let badgeStyle = "bg-amber-100 text-amber-800 border-amber-200";
                                                    let detail = null;

                                                    if (r.motivo === "MANUTENÇÃO") {
                                                        badgeStyle = "bg-red-100 text-red-800 border-red-200";
                                                        detail = (
                                                            <div className="flex flex-col gap-2 items-center justify-center mx-auto">
                                                                <span className="inline-block text-[11px] font-extrabold text-red-600 uppercase bg-red-50 border border-red-100 px-2.5 py-1 rounded">
                                                                    Desde {r.dataParada.split('-').reverse().join('/')}
                                                                </span>
                                                                <span className="inline-block text-[14px] font-black text-red-700 bg-red-100 px-3 py-1 rounded-md border border-red-200 shadow-sm leading-none">
                                                                    {calcularDiasParado(r.dataParada, r.id)} {calcularDiasParado(r.dataParada, r.id) === 1 ? 'dia' : 'dias'} parados
                                                                </span>
                                                            </div>
                                                        );
                                                    } else {
                                                        detail = (
                                                            <span className="text-[11px] font-bold text-amber-600 uppercase tracking-wide block text-center">
                                                                Aguardando liberação operacional
                                                            </span>
                                                        );
                                                    }

                                                    return (
                                                        <tr key={r.id} className={`table-row-spacing ${index % 2 === 0 ? "bg-white" : "bg-orange-50/10"}`}>
                                                            <td className="px-6 font-extrabold text-slate-900 text-left">
                                                                <p className="text-lg leading-none mb-1.5">{r.bloco}</p>
                                                                <p className="text-[10px] font-semibold text-slate-400 flex items-center gap-1">
                                                                    <SvgIcon name="clock" className="w-2.5 h-2.5" /> Reg: {r.hora || '--:--'}
                                                                </p>
                                                            </td>
                                                            <td className="px-6 text-center">
                                                                <span className={`inline-block px-3 py-1 rounded-full text-[10px] font-black border uppercase tracking-wider ${badgeStyle}`}>
                                                                    {r.motivo}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 text-center">
                                                                {detail}
                                                            </td>
                                                            <td className="px-6 text-center">
                                                                <span className="inline-flex items-center justify-center px-3 py-1 rounded-md border border-slate-200 bg-slate-50 font-bold text-sm text-slate-700">
                                                                    {r.segundos}s
                                                                </span>
                                                            </td>
                                                            <td className="px-6 text-right">
                                                                <div className={`inline-flex items-baseline justify-center w-[130px] px-3.5 py-2 rounded-xl border ${r.motivo === 'MANUTENÇÃO' ? 'border-red-200 bg-red-50' : 'border-amber-200 bg-amber-50'}`}>
                                                                    <p className={`text-2xl font-black leading-none ${r.motivo === 'MANUTENÇÃO' ? 'text-red-600' : 'text-amber-600'}`}>
                                                                        {r.vazao.toLocaleString('pt-BR', {maximumFractionDigits:0})}
                                                                        <span className={`text-[11px] font-bold ml-1 ${r.motivo === 'MANUTENÇÃO' ? 'text-red-500/70' : 'text-amber-500/70'}`}>L/h</span>
                                                                    </p>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
