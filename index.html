<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazenda Oásis - Gestão de Vazão</title>
    <meta name="theme-color" content="#0F6A52">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Resumo dos Poços">
    <link rel="icon" type="image/png" sizes="192x192" href="https://i.imgur.com/aRQ2VUl.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/aRQ2VUl.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(180deg, #F3F6FB 0%, #EEF2F8 100%);
            color: #0F172A;
        }

        #export-container {
            position: fixed;
            left: 0;
            top: 0;
            background: #FFFFFF;
            width: 800px;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            display: block !important;
        }

        .horizontal-ruler-track {
            width: 100%;
            height: 24px;
            background: #F1F5F9;
            border-radius: 4px;
            position: relative;
            border: 1px solid #E2E8F0;
            overflow: visible;
        }

        .horizontal-fill {
            height: 100%;
            background: linear-gradient(90deg, #3B82F6 0%, #2563EB 100%);
            transition: width 0.5s ease;
            border-radius: 3px;
        }

        .h-mark {
            position: absolute;
            top: 0;
            width: 1px;
            height: 100%;
            background: rgba(0,0,0,0.1);
        }

        .h-mark-label {
            position: absolute;
            top: 28px;
            transform: translateX(-50%);
            font-size: 9px;
            font-weight: 800;
            color: #64748b;
        }

        .bg-dark-custom { background: #0A0F1C; }
        .bg-green-custom { background: #059669; }
        .bg-header-custom { background: #041E12; }
        .app-surface {
            background: #FFFFFF;
            border: 1px solid #DCE4EF;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
        }
        .panel-title {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #8EA0B8;
        }
        
        .export-row {
            border-bottom: 1px solid #F1F5F9;
            padding: 16px 32px;
        }
        .export-unit-name {
            font-size: 20px;
            font-weight: 900;
            color: #1E293B;
            letter-spacing: -0.5px;
        }
        .export-status-badge {
            font-size: 11px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 8px;
            text-transform: uppercase;
        }
        .vazao-value {
            font-size: 28px;
            font-weight: 900;
            line-height: 1;
        }
        .export-header-title {
            font-size: 48px;
            line-height: 1;
        }
        .export-surface {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }
        .export-stat-card {
            border-radius: 24px;
            padding: 16px 14px;
            min-height: 132px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .afericao-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 8px;
            border-radius: 9999px;
            border: 1px solid #DBE7FF;
            background: #EFF6FF;
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #1D4ED8;
        }
        .afericao-badge strong {
            color: #334155;
            letter-spacing: 0.01em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const OASIS_LOGO_URL = "https://i.imgur.com/aRQ2VUl.png";
        const POCOS_LIST = Array.from({ length: 17 }, (_, i) => `POÇO ${String(i + 1).padStart(2, '0')}`);
        const MOTIVOS_LIST = ["TANQUE CHEIO", "MANUTENÇÃO", "ELÉTRICA", "AGUARDANDO"];
        const MAX_NIVEL = 4.71; 
        const MARKERS = [0, 1, 2, 3, 4, 4.71];

        // Função auxiliar para calcular os dias parados com base na data do registro
        const calcularDiasParado = (dataParada, timestampRegistro) => {
            if (!dataParada) return 0;
            const inicio = new Date(dataParada + 'T00:00:00');
            const fim = new Date(timestampRegistro);
            inicio.setHours(0,0,0,0);
            fim.setHours(0,0,0,0);
            const diff = Math.round((fim - inicio) / (1000 * 60 * 60 * 24));
            return diff >= 0 ? diff : 0;
        };

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
                droplet: <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />,
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />,
                database: <><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const HorizontalRuler = ({ percentage, value, compact = false, exportMode = false }) => (
            <div className="w-full">
                <div className={`relative ${exportMode ? 'mb-8' : 'mb-12'}`}>
                    <div className={exportMode ? 'w-full h-5 bg-slate-100 rounded-md relative border border-slate-200 overflow-visible' : 'horizontal-ruler-track'}>
                        <div className="horizontal-fill" style={{ width: `${Math.min(percentage, 100)}%` }}></div>
                        {MARKERS.map(m => (
                            <React.Fragment key={m}>
                                <div className="h-mark" style={{ left: `${(m/MAX_NIVEL)*100}%` }}></div>
                                <span className="h-mark-label" style={{ left: `${(m/MAX_NIVEL)*100}%` }}>{m}m</span>
                            </React.Fragment>
                        ))}
                    </div>
                </div>
                {!exportMode && (
                    <div className="flex justify-center items-baseline gap-1 mt-2">
                        <span className={`${compact ? 'text-3xl' : 'text-4xl'} font-black text-blue-600 tracking-tighter`}>{Math.round(percentage)}</span>
                        <span className={`${compact ? 'text-xl' : 'text-xl'} font-black text-blue-400`}>%</span>
                    </div>
                )}
            </div>
        );

        function App() {
            const [registros, setRegistros] = useState([]);
            const [nivelTanque, setNivelTanque] = useState("3,20");
            const [isExporting, setIsExporting] = useState(false);
            const [formData, setFormData] = useState({ 
                bloco: 'POÇO 01', 
                segundos: '0,00', 
                status: 'desligado',
                motivo: 'TANQUE CHEIO',
                dataParada: new Date().toISOString().split('T')[0] // Data inicial de hoje
            });
            const [showExport, setShowExport] = useState(false);
            const exportRef = useRef(null);

            useEffect(() => {
                const data = localStorage.getItem('oasis_vazao_v23');
                const tank = localStorage.getItem('oasis_tank_v23');
                if (data) setRegistros(JSON.parse(data));
                if (tank) setNivelTanque(tank);
            }, []);

            const stats = useMemo(() => {
                const totalVazao = registros.reduce((acc, curr) => acc + (Number(curr.vazao) || 0), 0);
                const vazaoMedia = registros.length > 0 ? totalVazao / registros.length : 0;
                
                const ativos = registros.filter(r => r.status === 'ligado').length;
                const metros = parseFloat(nivelTanque.replace(",", ".")) || 0;
                const porcentagem = (metros / MAX_NIVEL) * 100;

                return { 
                    totalVazao, vazaoMedia, ativos, metros, porcentagem,
                    totalRegistros: registros.length,
                    ordenados: [...registros].sort((a, b) => a.bloco.localeCompare(b.bloco))
                };
            }, [registros, nivelTanque]);

            const handleSave = (e) => {
                e.preventDefault();
                const segs = parseFloat(formData.segundos.replace(",", ".")) || 0;
                const vazaoCalculada = segs > 0 ? (15 / segs) * 3600 : 0;
                
                const agora = new Date();
                const horaFormatada = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                
                const novo = { 
                    ...formData, 
                    vazao: vazaoCalculada, 
                    id: Date.now(), 
                    hora: horaFormatada
                };

                const filtrados = registros.filter(r => r.bloco !== formData.bloco);
                const atualizados = [novo, ...filtrados];
                setRegistros(atualizados);
                localStorage.setItem('oasis_vazao_v23', JSON.stringify(atualizados));
            };

            const exportImage = async () => {
                setIsExporting(true);
                setShowExport(true);
                try {
                    await new Promise((resolve) => setTimeout(resolve, 180));
                    await new Promise((resolve) => requestAnimationFrame(() => resolve()));
                    await new Promise((resolve) => requestAnimationFrame(() => resolve()));
                    if (document.fonts && document.fonts.ready) {
                        await document.fonts.ready;
                    }

                    const sourceNode = exportRef.current;
                    if (!sourceNode) throw new Error("Área de exportação não disponível.");

                    const exportWrapper = document.createElement("div");
                    let dataUrl = "";
                    try {
                        const exportWidth = sourceNode.scrollWidth || 800;
                        exportWrapper.style.position = "fixed";
                        exportWrapper.style.left = "-99999px";
                        exportWrapper.style.top = "0";
                        exportWrapper.style.width = `${exportWidth}px`;
                        exportWrapper.style.maxWidth = `${exportWidth}px`;
                        exportWrapper.style.backgroundColor = "#ffffff";
                        exportWrapper.style.zIndex = "-1";

                        const exportClone = sourceNode.cloneNode(true);
                        exportClone.id = "export-container-clone";
                        exportClone.style.width = `${exportWidth}px`;
                        exportClone.style.maxWidth = `${exportWidth}px`;
                        exportClone.style.height = "auto";
                        exportClone.style.margin = "0";
                        exportClone.style.borderRadius = "0";
                        exportClone.style.border = "none";

                        exportWrapper.appendChild(exportClone);
                        document.body.appendChild(exportWrapper);

                        const clonedImages = Array.from(exportClone.querySelectorAll("img"));
                        await Promise.all(
                            clonedImages.map((img) => {
                                if (img.complete) return Promise.resolve();
                                return new Promise((resolve) => {
                                    img.onload = resolve;
                                    img.onerror = resolve;
                                });
                            })
                        );

                        const targetWidth = 1290;
                        const scaledHeight = Math.round((exportClone.scrollHeight * targetWidth) / exportWidth);

                        dataUrl = await window.htmlToImage.toPng(exportClone, {
                            pixelRatio: 3,
                            cacheBust: true,
                            backgroundColor: "#ffffff",
                            width: exportWidth,
                            canvasWidth: targetWidth,
                            canvasHeight: scaledHeight
                        });
                    } finally {
                        if (document.body.contains(exportWrapper)) {
                            document.body.removeChild(exportWrapper);
                        }
                    }

                    const link = document.createElement('a');
                    link.download = `Relatorio_Oasis_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.png`;
                    link.href = dataUrl;
                    link.click();
                } catch (error) {
                    console.error("Falha ao exportar relatório:", error);
                    alert("Não foi possível gerar a imagem. Tente novamente.");
                } finally {
                    const danglingClone = document.getElementById("export-container-clone");
                    if (danglingClone) danglingClone.remove();
                    setShowExport(false);
                    setIsExporting(false);
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="text-white p-4 sm:p-5 sticky top-0 z-40 shadow-lg" style={{ background: 'linear-gradient(135deg, #072E21 0%, #083526 55%, #0B4A35 100%)' }}>
                        <div className="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                            <div className="flex items-center gap-4">
                                <img src={OASIS_LOGO_URL} className="h-12 sm:h-14" alt="Logo" />
                                <div>
                                    <h1 className="text-xl sm:text-2xl font-black uppercase leading-none">Painel de Vazão</h1>
                                    <p className="text-[10px] font-bold text-emerald-200 uppercase tracking-[0.24em] mt-1">Resumo Operacional</p>
                                </div>
                            </div>
                            <button onClick={exportImage} className="bg-emerald-500 hover:bg-emerald-400 transition-colors px-7 py-3 rounded-full font-black text-[11px] uppercase flex items-center justify-center gap-2 shadow-md w-full sm:w-auto">
                                <SvgIcon name="image" /> {isExporting ? "Gerando..." : "Baixar Imagem"}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-3 sm:p-5 grid md:grid-cols-[360px_1fr] gap-4 sm:gap-6 mt-3 sm:mt-5">
                        <div className="space-y-6">
                            <div className="app-surface p-5 sm:p-6 rounded-3xl">
                                <div className="flex justify-between items-center mb-4">
                                    <p className="panel-title flex items-center gap-2">
                                        <SvgIcon name="droplet" className="w-3 h-3 text-blue-500" /> Nível Tanque
                                    </p>
                                    <span className="text-[11px] font-black text-blue-700 bg-blue-100 px-2.5 py-1 rounded-full">
                                        {Math.round(stats.porcentagem)}%
                                    </span>
                                </div>
                                <input type="text" value={nivelTanque} 
                                    onChange={(e) => {
                                        let val = e.target.value.replace(/\D/g, "");
                                        let formatted = (parseFloat(val || 0) / 100).toFixed(2).replace(".", ",");
                                        setNivelTanque(formatted);
                                        localStorage.setItem('oasis_tank_v23', formatted);
                                    }}
                                    className="w-full p-3 bg-slate-50 border-2 border-slate-200 rounded-xl text-center font-black text-2xl text-blue-900 outline-none focus:border-blue-400 transition-all mb-4"
                                />
                                <div className="mt-4"><HorizontalRuler percentage={stats.porcentagem} value={nivelTanque} compact /></div>
                            </div>

                            <div className="app-surface p-5 sm:p-6 rounded-3xl">
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div>
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Unidade</p>
                                        <select value={formData.bloco} onChange={e => {
                                            const poçoExistente = registros.find(r => r.bloco === e.target.value);
                                            if(poçoExistente) setFormData(poçoExistente);
                                            else setFormData({...formData, bloco: e.target.value});
                                        }} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none">
                                            {POCOS_LIST.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-2">
                                        <button type="button" onClick={() => setFormData({...formData, status: 'ligado'})} className={`py-3 rounded-xl font-black text-[9px] uppercase border-2 transition-all ${formData.status === 'ligado' ? 'bg-emerald-500 text-white border-emerald-600 shadow-md' : 'bg-slate-50 text-slate-400 border-slate-200'}`}>Ligado</button>
                                        <button type="button" onClick={() => setFormData({...formData, status: 'desligado'})} className={`py-3 rounded-xl font-black text-[9px] uppercase border-2 transition-all ${formData.status === 'desligado' ? 'bg-orange-500 text-white border-orange-600 shadow-md' : 'bg-slate-50 text-slate-400 border-slate-200'}`}>Desligado</button>
                                    </div>

                                    {formData.status === 'desligado' && (
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Motivo</p>
                                                <select 
                                                    value={formData.motivo} 
                                                    onChange={e => setFormData({...formData, motivo: e.target.value})} 
                                                    className={`w-full p-2.5 border rounded-xl font-bold text-[10px] outline-none ${formData.motivo === 'MANUTENÇÃO' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-orange-50 border-orange-100 text-orange-700'}`}
                                                >
                                                    {MOTIVOS_LIST.map(m => <option key={m} value={m}>{m}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Data da Parada</p>
                                                <input 
                                                    type="date" 
                                                    value={formData.dataParada}
                                                    onChange={e => setFormData({...formData, dataParada: e.target.value})}
                                                    className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 text-[10px] outline-none"
                                                />
                                            </div>
                                        </div>
                                    )}

                                    <div>
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-2">Segundos (15L)</p>
                                        <input type="text" value={formData.segundos}
                                            onChange={e => {
                                                let val = e.target.value.replace(/\D/g, "");
                                                let formatted = (parseFloat(val || 0) / 100).toFixed(2).replace(".", ",");
                                                setFormData({...formData, segundos: formatted});
                                            }}
                                            className={`w-full p-3 border-2 rounded-xl text-center font-black text-xl outline-none transition-all ${formData.status === 'desligado' ? 'bg-orange-50 border-orange-100 text-orange-900' : 'bg-emerald-50 border-emerald-100 text-emerald-900'}`}
                                        />
                                    </div>
                                    <button className="w-full text-white py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg hover:brightness-110 transition-all" style={{ background: 'linear-gradient(135deg, #073D2B 0%, #0C5C40 100%)' }}>Salvar Registro</button>
                                </form>
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4">
                                <div className="p-3 sm:p-4 rounded-2xl text-white text-center shadow-md" style={{ background: 'linear-gradient(145deg, #2563EB 0%, #1D4ED8 100%)' }}>
                                    <p className="text-[8px] font-black text-blue-100 uppercase tracking-widest mb-1">Vazão Total</p>
                                    <p className="text-lg sm:text-xl font-black text-white">{stats.totalVazao.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                    <p className="text-[7px] font-bold text-blue-100 mt-1 uppercase">L/H (Geral)</p>
                                </div>
                                <div className="p-3 sm:p-4 rounded-2xl border text-center shadow-sm" style={{ background: '#EEF4FF', borderColor: '#D7E5FF' }}>
                                    <p className="text-[8px] font-black text-blue-500 uppercase tracking-widest mb-1">Média</p>
                                    <p className="text-lg sm:text-xl font-black text-blue-700">{stats.vazaoMedia.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                    <p className="text-[7px] font-bold text-blue-300 mt-1 uppercase">L/H</p>
                                </div>
                                <div className="p-3 sm:p-4 rounded-2xl border text-center shadow-sm" style={{ background: '#FFFFFF', borderColor: '#DCE3ED' }}>
                                    <p className="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">Nível</p>
                                    <p className="text-lg sm:text-xl font-black text-slate-800">{Math.round(stats.porcentagem)}%</p>
                                    <p className="text-[7px] font-bold text-slate-500 mt-1 uppercase">{nivelTanque}m</p>
                                </div>
                                <div className="p-3 sm:p-4 rounded-2xl text-white text-center shadow-md" style={{ background: '#1F9F77' }}>
                                    <p className="text-[8px] font-black text-emerald-100 uppercase tracking-widest mb-1">Ativos</p>
                                    <p className="text-lg sm:text-xl font-black">{stats.ativos}</p>
                                    <p className="text-[7px] font-bold text-emerald-50 mt-1 uppercase">de {stats.totalRegistros}</p>
                                </div>
                            </div>

                            <div className="app-surface rounded-2xl overflow-hidden">
                                <div className="p-3 bg-slate-50 border-b border-slate-200 text-[9px] font-black text-slate-500 uppercase tracking-widest">Monitoramento em Tempo Real</div>
                                {stats.ordenados.map(reg => (
                                    <div key={reg.id} className="p-4 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3 hover:bg-slate-50/80 transition-colors">
                                        <div className="flex items-center gap-4">
                                            <div className={`p-2 rounded-lg ${reg.status === 'ligado' ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'}`}>
                                                <SvgIcon name={reg.status === 'ligado' ? "activity" : "database"} className="w-4 h-4" />
                                            </div>
                                            <div>
                                                <div className="flex items-center gap-2">
                                                    <p className="text-sm font-black text-slate-900">{reg.bloco}</p>
                                                    <span className="text-[9px] font-bold text-slate-400 flex items-center gap-1">
                                                        <SvgIcon name="clock" className="w-2.5 h-2.5" /> {reg.hora || '--:--'}
                                                    </span>
                                                </div>
                                                <div className="flex gap-2 mt-0.5 items-center">
                                                    <span className={`text-[7px] font-bold px-1.5 py-0.5 rounded uppercase ${reg.status === 'ligado' ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-500 text-white'}`}>{reg.status}</span>
                                                    
                                                    {reg.status === 'desligado' && (
                                                        <>
                                                            <span className={`text-[7px] font-bold px-1.5 py-0.5 rounded uppercase ${reg.motivo === 'MANUTENÇÃO' ? 'bg-red-600 text-white' : 'bg-orange-100 text-orange-700'}`}>{reg.motivo}</span>
                                                            {reg.dataParada && (
                                                                <span className="text-[7px] font-bold px-1.5 py-0.5 rounded uppercase bg-slate-100 text-slate-500 border border-slate-200">
                                                                    {calcularDiasParado(reg.dataParada, reg.id)}d parado
                                                                </span>
                                                            )}
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex items-center justify-between sm:justify-start gap-4 w-full sm:w-auto">
                                            <div className="text-right ml-auto sm:ml-0">
                                                <p className={`text-lg font-black ${reg.status === 'ligado' ? 'text-emerald-600' : 'text-orange-500'}`}>
                                                    {reg.vazao.toLocaleString('pt-BR', {maximumFractionDigits:0})} <span className="text-[9px]">L/h</span>
                                                </p>
                                                <p className="text-[8px] font-bold text-slate-400 uppercase">Aferição: {reg.segundos}s</p>
                                            </div>
                                            <button onClick={() => {
                                                const novos = registros.filter(r => r.id !== reg.id);
                                                setRegistros(novos);
                                                localStorage.setItem('oasis_vazao_v23', JSON.stringify(novos));
                                            }} className="text-slate-200 hover:text-red-500 ml-2"><SvgIcon name="trash" className="w-3.5 h-3.5" /></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* ÁREA DE EXPORTAÇÃO */}
                    {showExport && (
                        <div id="export-container" ref={exportRef} className="bg-white">
                            <div className="px-8 py-5 text-white border-b-[8px] border-emerald-600" style={{background: 'linear-gradient(135deg, #0D5B46 0%, #0F6A52 55%, #158368 100%)'}}>
                                <div className="grid grid-cols-[120px_minmax(0,1fr)_260px] items-center gap-6 min-h-[112px]">
                                    <div className="flex justify-center">
                                        <img src={OASIS_LOGO_URL} className="h-[96px]" crossOrigin="anonymous" />
                                    </div>
                                    <div className="text-left min-w-0">
                                        <h1 className="text-[18px] font-black uppercase tracking-tight leading-[1.2] mb-2 pb-0.5 whitespace-nowrap">Resumo de Vazão dos Poços</h1>
                                        <p className="text-[14px] font-black text-emerald-200 uppercase tracking-[0.1em]">Registro Operacional</p>
                                    </div>
                                    <div className="text-center bg-white/10 border border-white/15 rounded-2xl px-4 py-2 backdrop-blur-sm w-[260px] self-center justify-self-end">
                                    <p className="text-[10px] font-black text-emerald-100 uppercase tracking-widest mb-1">Relatório Gerado em</p>
                                    <p className="text-3xl font-black leading-none">{new Date().toLocaleDateString('pt-BR')}</p>
                                </div>
                                </div>
                            </div>

                            <div className="p-8 bg-slate-50">
                                <div className="grid grid-cols-3 gap-5 mb-5">
                                    <div className="export-stat-card text-white" style={{ background: 'linear-gradient(145deg, #2563EB 0%, #1D4ED8 100%)' }}>
                                        <p className="text-[10px] font-black text-blue-100 uppercase tracking-widest mb-1">Vazão Total</p>
                                        <p className="text-4xl font-black text-white leading-none">{stats.totalVazao.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                        <p className="text-[9px] font-bold text-blue-100 mt-1 uppercase">Litros / Hora</p>
                                    </div>
                                    <div className="export-stat-card border" style={{ background: '#EEF4FF', borderColor: '#D7E5FF' }}>
                                        <p className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">Vazão Média</p>
                                        <p className="text-4xl font-black text-blue-700 leading-none">{stats.vazaoMedia.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                        <p className="text-[9px] font-bold text-blue-300 mt-1 uppercase">Média Geral L/H</p>
                                    </div>
                                    <div className="export-stat-card text-white" style={{ background: '#1F9F77' }}>
                                        <p className="text-[10px] font-black text-emerald-100 uppercase tracking-widest mb-1">Poços Ativos</p>
                                        <p className="text-5xl font-black leading-none">{stats.ativos}</p>
                                        <p className="text-[9px] font-bold text-emerald-50 mt-2 uppercase">de {stats.totalRegistros} unidades</p>
                                    </div>
                                </div>

                                <div className="export-surface p-8 px-10 text-center mb-8">
                                    <div className="flex justify-between items-center mb-5">
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-blue-500 rounded-full"></div>
                                            <p className="text-sm font-black text-slate-600 uppercase tracking-widest">Nível Atual do Tanque Hídrico</p>
                                        </div>
                                        <div className="bg-blue-600 text-white px-5 py-2 rounded-full font-black text-2xl leading-none">
                                            {nivelTanque}m - {Math.round(stats.porcentagem)}%
                                        </div>
                                    </div>
                                    <HorizontalRuler percentage={stats.porcentagem} value={nivelTanque} exportMode />
                                </div>

                                <div className="grid grid-cols-2 gap-6 mb-8 items-start">
                                    {/* TABELA: POÇOS ATIVOS */}
                                    <div className="export-surface rounded-[24px] overflow-hidden mb-0">
                                        <div className="bg-emerald-50 py-4 text-center border-b border-emerald-100">
                                            <p className="text-[11px] font-black text-emerald-700 uppercase tracking-[0.2em]">Poços Ativos</p>
                                        </div>
                                        <div className="divide-y divide-slate-100">
                                            {stats.ordenados.filter(r => r.status === 'ligado').length === 0 ? (
                                                <div className="p-6 text-center text-slate-400 text-sm font-bold">Nenhum poço ativo</div>
                                            ) : (
                                                stats.ordenados.filter(r => r.status === 'ligado').map((r) => (
                                                    <div key={r.id} className="p-5 flex items-center justify-between bg-white">
                                                        <div>
                                                            <div className="flex items-center gap-2">
                                                                <span className="font-black text-slate-800 text-lg">{r.bloco}</span>
                                                            </div>
                                                            <span className="text-[10px] font-bold text-slate-400 mt-1">Reg: {r.hora || '--:--'}</span>
                                                        </div>
                                                        <div className="text-right">
                                                            <p className="text-2xl font-black text-emerald-600 leading-none">
                                                                {r.vazao.toLocaleString('pt-BR', {maximumFractionDigits:0})} <span className="text-[12px]">L/h</span>
                                                            </p>
                                                            <p className="text-[9px] font-bold text-slate-400 mt-1.5 uppercase">Aferição: {r.segundos}s</p>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>

                                    {/* TABELA: POÇOS EM MANUTENÇÃO / PARADOS */}
                                    <div className="export-surface rounded-[24px] overflow-hidden mb-0">
                                        <div className="bg-orange-50 py-4 text-center border-b border-orange-100">
                                            <p className="text-[11px] font-black text-orange-700 uppercase tracking-[0.2em]">Poços Parados / Manutenção</p>
                                        </div>
                                        <div className="divide-y divide-slate-100">
                                            {stats.ordenados.filter(r => r.status === 'desligado').length === 0 ? (
                                                <div className="p-6 text-center text-slate-400 text-sm font-bold">Nenhum poço parado</div>
                                            ) : (
                                                stats.ordenados.filter(r => r.status === 'desligado').map((r) => (
                                                    <div key={r.id} className="p-5 flex items-center justify-between bg-white">
                                                        <div className="flex-1">
                                                            <div className="flex items-center gap-2">
                                                                <span className="font-black text-slate-800 text-lg">{r.bloco}</span>
                                                            </div>
                                                            <span className="text-[10px] font-bold text-slate-400 mt-1">Reg: {r.hora || '--:--'}</span>
                                                            
                                                            <div className="flex gap-2 mt-2.5">
                                                                <div className={`px-2 py-0.5 rounded font-black text-[9px] uppercase border ${r.motivo === 'MANUTENÇÃO' ? 'bg-red-50 text-red-700 border-red-100' : 'bg-orange-50 text-orange-700 border-orange-100'}`}>
                                                                    {r.motivo}
                                                                </div>
                                                                {r.dataParada && (
                                                                    <div className="px-2 py-0.5 rounded font-black text-[9px] uppercase bg-slate-100 text-slate-500 border border-slate-200">
                                                                        {calcularDiasParado(r.dataParada, r.id)}d parado
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>

                                                        {/* MOSTRAR ÚLTIMA VAZÃO DESTACADA QUANDO HOUVER REGISTRO DE SEGUNDOS */}
                                                        {r.segundos && r.segundos !== '0,00' && r.segundos !== '0' && (
                                                            <div className={`text-right ml-3 pl-4 border-l ${r.motivo === 'MANUTENÇÃO' ? 'border-red-100' : 'border-slate-100'}`}>
                                                                <p className={`text-[8px] font-black uppercase tracking-wider mb-0.5 ${r.motivo === 'MANUTENÇÃO' ? 'text-red-400' : 'text-slate-400'}`}>Última Vazão</p>
                                                                <p className={`text-xl font-black leading-none ${r.motivo === 'MANUTENÇÃO' ? 'text-red-600' : 'text-orange-500'}`}>
                                                                    {r.vazao.toLocaleString('pt-BR', {maximumFractionDigits:0})} <span className={`text-[10px] ${r.motivo === 'MANUTENÇÃO' ? 'text-red-400' : 'text-orange-300'}`}>L/h</span>
                                                                </p>
                                                                <p className={`text-[8px] font-bold mt-1 uppercase ${r.motivo === 'MANUTENÇÃO' ? 'text-red-400' : 'text-slate-400'}`}>Aferição: {r.segundos}s</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
