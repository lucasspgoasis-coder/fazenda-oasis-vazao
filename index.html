<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis - Leitura Diária</title>
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Bibliotecas de Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .logo-img { object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1)); }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // URL do logotipo da Oasis
        const OASIS_LOGO_URL = "https://i.imgur.com/fx8tSao.png";

        const OasisLogo = ({ size = "md" }) => {
            const iconSize = size === "lg" ? "h-24" : "h-14";
            return (
                <div className="flex items-center gap-3">
                    <img src={OASIS_LOGO_URL} alt="Oasis Logo" className={`${iconSize} logo-img block`} crossOrigin="anonymous" />
                </div>
            );
        };

        const SvgIcon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                fileText: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        function App() {
            const [registros, setRegistros] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isExporting, setIsExporting] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ bloco: '', segundos: '' });
            const reportRef = useRef(null);

            // Carregar dados do LocalStorage ao iniciar
            useEffect(() => {
                const localData = localStorage.getItem('oasis_vazao_data');
                if (localData) {
                    setRegistros(JSON.parse(localData));
                }
                setLoading(false);
            }, []);

            // Função para salvar no LocalStorage
            const saveToLocal = (data) => {
                localStorage.setItem('oasis_vazao_data', JSON.stringify(data));
                setRegistros(data);
            };

            const stats = useMemo(() => {
                const total = registros.reduce((acc, curr) => acc + (Number(curr.vazaoCalculada) || 0), 0);
                const media = registros.length > 0 ? total / registros.length : 0;
                return { 
                    total, 
                    media, 
                    ativos: new Set(registros.map(r => r.bloco)).size,
                    count: registros.length
                };
            }, [registros]);

            const handleSave = (e) => {
                e.preventDefault();
                setIsSaving(true);
                
                const segs = parseFloat(formData.segundos);
                const vazao = (15 / segs) * 3600;

                const payload = {
                    bloco: formData.bloco.toUpperCase(),
                    segundos: segs,
                    vazaoCalculada: vazao,
                    dataRegistro: new Date().toLocaleDateString('pt-BR'),
                    timestamp: Date.now()
                };

                let updatedRecords;
                if (editingId) {
                    updatedRecords = registros.map(r => r.id === editingId ? { ...payload, id: editingId } : r);
                } else {
                    updatedRecords = [{ ...payload, id: Date.now().toString() }, ...registros];
                }

                saveToLocal(updatedRecords);
                setEditingId(null);
                setFormData({ bloco: '', segundos: '' });
                setIsSaving(false);
            };

            const handleDelete = (id) => {
                if (confirm("Deseja realmente excluir este registro?")) {
                    const updated = registros.filter(r => r.id !== id);
                    saveToLocal(updated);
                }
            };

            const exportPDF = async () => {
                setIsExporting(true);
                const template = reportRef.current;
                template.style.height = "auto"; 
                template.style.opacity = "1";
                
                await new Promise(r => setTimeout(r, 800));
                
                const canvas = await html2canvas(template, { 
                    scale: 2, 
                    useCORS: true, 
                    allowTaint: true,
                    backgroundColor: "#ffffff"
                });
                
                template.style.height = "0"; 
                template.style.opacity = "0";
                
                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                const pdfWidth = 210;
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`Oasis_Relatorio_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.pdf`);
                setIsExporting(false);
            };

            if (loading) return (
                <div className="min-h-screen bg-emerald-950 flex items-center justify-center text-white font-black uppercase tracking-widest">
                    Iniciando Sistema Oasis...
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    
                    {/* TEMPLATE PDF OCULTO */}
                    <div style={{ height: 0, overflow: 'hidden', opacity: 0 }} ref={reportRef}>
                        <div className="w-[800px] bg-white p-12 space-y-10">
                            <div className="flex justify-between items-center border-b-8 border-emerald-900 pb-8">
                                <OasisLogo size="lg" />
                                <div className="text-right">
                                    <p className="text-2xl font-black text-slate-800">{new Date().toLocaleDateString('pt-BR')}</p>
                                    <p className="text-sm font-bold text-emerald-600 uppercase tracking-widest">Relatório de Vazão Diária</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-3 gap-6">
                                <div className="bg-slate-50 p-8 rounded-[2rem] border text-center">
                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Vazão Total</p>
                                    <p className="text-4xl font-black text-blue-600">{stats.total.toLocaleString('pt-BR')} <small className="text-xs">L/h</small></p>
                                </div>
                                <div className="bg-slate-50 p-8 rounded-[2rem] border text-center">
                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Poços Registrados</p>
                                    <p className="text-4xl font-black text-emerald-600">{stats.ativos}</p>
                                </div>
                                <div className="bg-slate-50 p-8 rounded-[2rem] border text-center">
                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Média L/h</p>
                                    <p className="text-4xl font-black text-slate-800">{stats.media.toLocaleString('pt-BR', {maximumFractionDigits:0})}</p>
                                </div>
                            </div>

                            <div className="space-y-4">
                                <div className="flex bg-emerald-950 text-white p-5 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em]">
                                    <span className="w-1/3">Identificação do Poço</span>
                                    <span className="w-1/3 text-center">Tempo (Base 15L)</span>
                                    <span className="w-1/3 text-right">Vazão Calculada (L/h)</span>
                                </div>
                                {registros.map(r => (
                                    <div key={r.id} className="flex items-center p-6 border-b border-slate-100">
                                        <div className="w-1/3 font-black text-3xl text-slate-900">{r.bloco}</div>
                                        <div className="w-1/3 text-center text-xl font-bold text-slate-400">{r.segundos}s</div>
                                        <div className="w-1/3 text-right font-black text-3xl text-emerald-700">
                                            {r.vazaoCalculada.toLocaleString('pt-BR', {maximumFractionDigits:0})}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="pt-10 text-center border-t border-slate-100">
                                <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">Fazenda Oasis • Gestão de Recursos Hídricos</p>
                            </div>
                        </div>
                    </div>

                    {/* INTERFACE DO USUÁRIO */}
                    <header className="bg-emerald-950 text-white p-6 sticky top-0 z-40 shadow-2xl border-b border-white/5">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex flex-col items-center md:items-start">
                                <OasisLogo />
                                <span className="text-[9px] font-black text-emerald-500 uppercase tracking-widest mt-2 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">
                                    Modo de Operação Local
                                </span>
                            </div>
                            
                            <div className="flex flex-wrap justify-center gap-6 items-center bg-white/5 p-4 rounded-[2rem] border border-white/10">
                                <div className="text-center px-4">
                                    <p className="text-[8px] font-bold text-emerald-500 uppercase mb-1">Total L/h</p>
                                    <p className="text-xl font-black">{stats.total.toLocaleString('pt-BR')}</p>
                                </div>
                                <div className="text-center px-4 border-l border-white/10">
                                    <p className="text-[8px] font-bold text-emerald-500 uppercase mb-1">Poços</p>
                                    <p className="text-xl font-black">{stats.ativos}</p>
                                </div>
                                <button 
                                    onClick={exportPDF} 
                                    disabled={isExporting || registros.length === 0} 
                                    className="bg-blue-600 hover:bg-blue-500 disabled:opacity-50 transition-all px-6 py-4 rounded-2xl font-black text-[10px] uppercase flex items-center gap-2 shadow-lg"
                                >
                                    {isExporting ? "A Gerar..." : <><SvgIcon name="fileText" /> Exportar PDF</>}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 mt-10 grid lg:grid-cols-2 gap-12">
                        {/* Formulário */}
                        <section>
                            <div className="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-200 sticky top-48">
                                <div className="flex items-center gap-3 mb-8">
                                    <div className="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <h2 className="text-[12px] font-black uppercase text-slate-400 tracking-widest">
                                        {editingId ? "Editar Registro" : "Nova Leitura"}
                                    </h2>
                                </div>
                                
                                <form onSubmit={handleSave} className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-4 mb-2 block">Identificação do Poço</label>
                                        <input 
                                            type="text" required placeholder="Ex: P01, Sede, etc"
                                            value={formData.bloco} onChange={e => setFormData({...formData, bloco: e.target.value.toUpperCase()})}
                                            className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-3xl font-black text-xl focus:border-emerald-500 outline-none uppercase transition-all"
                                        />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-4 mb-2 block">Segundos (para 15 Litros)</label>
                                        <input 
                                            type="number" step="0.01" required placeholder="0.00"
                                            value={formData.segundos} onChange={e => setFormData({...formData, segundos: e.target.value})}
                                            className="w-full p-8 bg-emerald-50 border-2 border-emerald-100 rounded-[2rem] font-black text-5xl text-emerald-700 outline-none focus:border-emerald-500 transition-all"
                                        />
                                    </div>
                                    <div className="flex gap-3">
                                        {editingId && (
                                            <button 
                                                type="button" 
                                                onClick={() => { setEditingId(null); setFormData({bloco:'', segundos:''})}} 
                                                className="flex-1 bg-slate-200 text-slate-500 font-black py-6 rounded-3xl uppercase tracking-widest text-xs"
                                            >
                                                Cancelar
                                            </button>
                                        )}
                                        <button 
                                            type="submit" 
                                            className="flex-[2] bg-emerald-600 text-white font-black py-6 rounded-3xl shadow-xl uppercase tracking-widest hover:bg-emerald-700 transition-all active:scale-95"
                                        >
                                            {editingId ? "Atualizar Dados" : "Salvar Registro"}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </section>

                        {/* Lista de Registros */}
                        <section className="space-y-6">
                            <div className="flex justify-between items-end px-4">
                                <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter italic">Leituras Recentes</h2>
                                <span className="text-[10px] font-black text-slate-400 bg-white border px-4 py-2 rounded-full shadow-sm">
                                    {registros.length} Poços Hoje
                                </span>
                            </div>

                            <div className="grid gap-5">
                                {registros.length === 0 ? (
                                    <div className="bg-white p-24 rounded-[3rem] border-2 border-dashed border-slate-200 text-center">
                                        <p className="text-slate-300 font-black uppercase text-xs tracking-[0.3em]">Nenhum dado registrado</p>
                                    </div>
                                ) : registros.map(reg => (
                                    <div key={reg.id} className="bg-white rounded-[2.5rem] p-8 border border-slate-200 shadow-sm hover:shadow-md hover:border-emerald-200 transition-all group">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <h3 className="text-4xl font-[900] text-slate-900 uppercase tracking-tighter leading-none">{reg.bloco}</h3>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase mt-3 flex items-center gap-2">
                                                    <SvgIcon name="clock" className="w-3 h-3" /> {reg.dataRegistro} • {reg.segundos}s p/ 15L
                                                </p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-4xl font-[900] text-emerald-600 leading-none tracking-tighter">
                                                    {reg.vazaoCalculada.toLocaleString('pt-BR', {maximumFractionDigits:0})}
                                                </p>
                                                <p className="text-[10px] font-black text-slate-300 uppercase mt-2 tracking-widest">Litros / Hora</p>
                                            </div>
                                        </div>
                                        
                                        <div className="mt-8 pt-6 border-t border-slate-50 flex justify-end gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button 
                                                onClick={() => { setEditingId(reg.id); setFormData({bloco: reg.bloco, segundos: reg.segundos}); window.scrollTo({top: 0, behavior:'smooth'}) }}
                                                className="flex items-center gap-2 px-5 py-3 rounded-2xl bg-amber-50 text-amber-600 font-black text-[10px] uppercase hover:bg-amber-100 transition-all"
                                            >
                                                <SvgIcon name="edit" /> Editar
                                            </button>
                                            <button 
                                                onClick={() => handleDelete(reg.id)}
                                                className="flex items-center gap-2 px-5 py-3 rounded-2xl bg-red-50 text-red-400 font-black text-[10px] uppercase hover:bg-red-100 transition-all"
                                            >
                                                <SvgIcon name="trash" /> Excluir
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
