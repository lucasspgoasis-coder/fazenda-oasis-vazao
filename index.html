    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(180deg, #F8FAFC 0%, #F1F5F9 100%);
            color: #0F172A;
        }

        #export-container {
            position: fixed;
            left: 0;
            top: 0;
            background: #FFFFFF;
            width: 1200px;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            display: block !important;
        }

        .horizontal-ruler-track {
            width: 100%;
            height: 28px;
            background: #F1F5F9;
            border-radius: 8px;
            position: relative;
            border: 1px solid #E2E8F0;
            overflow: visible;
        }

        .horizontal-fill {
            height: 100%;
            background: linear-gradient(90deg, #3B82F6 0%, #1D4ED8 100%);
            transition: width 0.5s ease;
            border-radius: 7px;
        }

        .h-mark {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(15, 23, 42, 0.08);
        }

        .h-mark-label {
            position: absolute;
            top: 32px;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: 800;
            color: #475569;
        }

            background: #FFFFFF;
            border: 1px solid #E2E8F0;
